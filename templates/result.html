<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compression Success!</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-sans p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-lg w-full text-center border border-slate-200">
        
        <h2 class="text-3xl font-extrabold text-green-600 mb-6">Mission Accomplished! 🚀</h2>
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-red-50 border border-red-200 rounded-xl p-4 shadow-sm">
                <p class="text-red-500 text-sm font-bold">📁 Original Size</p>
                <p class="text-red-700 text-2xl font-black mt-1">{{ original_size }} KB</p>
            </div>
            
            <div class="bg-green-50 border border-green-200 rounded-xl p-4 shadow-sm">
                <p class="text-green-500 text-sm font-bold">🎯 Compressed</p>
                <p class="text-green-700 text-2xl font-black mt-1">{{ new_size }} KB</p>
            </div>
        </div>

        <div class="bg-blue-50 border border-blue-200 rounded-lg py-4 mb-8">
            {% if saved_kb <= 0 %}
                <p class="text-blue-700 font-bold text-lg">✨ Perfectly Matched Target Size! ✨</p>
            {% else %}
                <p class="text-blue-700 font-bold text-lg">🔥 You Saved {{ saved_kb }} KB Space! 🔥</p>
            {% endif %}
        </div>

        <div class="space-y-4">
            <a href="/download/{{ filename }}" class="block w-full bg-slate-900 text-white font-bold text-lg py-4 rounded-xl hover:bg-slate-800 transition shadow-lg text-center">
                ⬇️ DOWNLOAD COMPRESSED PDF
            </a>
            <a href="/" class="block w-full text-slate-500 font-semibold hover:text-slate-800 transition underline">
                Compress Another File
            </a>
        </div>

    </div>

</body>
</html>
