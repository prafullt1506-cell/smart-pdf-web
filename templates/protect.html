<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Security Suite - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-rose-50 via-slate-50 to-red-50 min-h-screen flex items-center justify-center font-sans p-6 relative">

    <a href="/" class="absolute top-6 left-6 flex items-center gap-2 bg-white/80 backdrop-blur-md text-slate-700 px-5 py-2.5 rounded-full shadow-sm border border-slate-200 hover:bg-white hover:shadow-md hover:text-rose-600 transition-all font-semibold text-sm">
        <i class="fa-solid fa-arrow-left"></i> Dashboard
    </a>

    <div class="glass-card w-full max-w-[600px] p-10 rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.05)] relative overflow-hidden transition-all duration-500">
        
        <div class="text-center mb-8">
            <span class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full bg-rose-50 text-rose-600 font-bold text-[10px] uppercase tracking-widest mb-4 border border-rose-100 shadow-sm">
                <i class="fa-solid fa-shield-halved"></i> Military Grade Encryption Active
            </span>
            <h1 id="toolTitle" class="text-4xl font-extrabold text-slate-800 tracking-tight transition-all">Protect PDF</h1>
            <p id="toolSub" class="text-sm text-slate-500 mt-2 font-medium">Encrypt your PDF architecture with a strong custom security key.</p>
        </div>

        <div class="flex justify-center mb-8 relative">
            <div class="absolute inset-0 flex items-center" aria-hidden="true">
                <div class="w-full border-t border-slate-200 border-dashed"></div>
            </div>
            <button onclick="toggleSwapMode()" class="relative group bg-slate-900 hover:bg-slate-800 text-white font-bold px-6 py-2.5 rounded-full shadow-lg hover:shadow-slate-500/30 transition-all duration-300 flex items-center gap-3 tracking-wide text-xs uppercase border border-slate-700">
                <i id="swapIcon" class="fa-solid fa-arrows-rotate transition-transform duration-700 ease-in-out"></i> 
                <span>Switch Security Mode</span>
            </button>
        </div>

        <input type="file" id="fileInput" class="hidden" accept=".pdf">

        <div onclick="triggerUpload()" class="border-2 border-dashed border-slate-200 hover:border-rose-400 bg-slate-50/50 hover:bg-rose-50/30 p-10 rounded-3xl text-center cursor-pointer transition-all duration-300 mb-6 group">
            <div class="text-5xl text-slate-300 group-hover:text-rose-500 group-hover:scale-110 transition-all duration-300 mb-4">
                <i id="dropzoneIcon" class="fa-solid fa-lock text-rose-400"></i>
            </div>
            <p id="dropzoneText" class="text-sm font-extrabold text-slate-700 mb-1">Click to Upload target PDF File</p>
        </div>

        <div id="fileDisplay" class="hidden flex justify-between items-center bg-white border border-slate-100 rounded-xl p-4 mb-6 shadow-sm">
            <div class="flex items-center w-4/5">
                <i class="fa-solid fa-file-pdf text-rose-500 mr-3 text-lg"></i>
                <span id="fileName" class="text-sm font-bold text-slate-700 truncate">filename.pdf</span>
            </div>
            <button onclick="clearFile()" class="text-slate-300 hover:text-red-500 transition-colors px-2"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>

        <div class="bg-white border border-slate-200 rounded-2xl p-5 mb-6 shadow-sm">
            <label id="pwdLabel" class="font-bold text-slate-700 text-sm mb-2 block">Set Security Password:</label>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 flex items-center进 left-0 pl-4 text-slate-400">
                    <i class="fa-solid fa-key"></i>
                </span>
                <input type="password" id="pdfPassword" placeholder="Enter security passphrase" class="w-full border border-slate-200 bg-slate-50 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-rose-400 focus:bg-white font-medium text-slate-800 transition-all">
            </div>
        </div>

        <div class="w-full bg-slate-100 rounded-full h-2 mb-6 overflow-hidden">
            <div id="progressBar" class="bg-gradient-to-r from-rose-400 via-red-500 to-pink-500 h-full rounded-full w-0 transition-all duration-300 relative"></div>
        </div>

        <button id="startBtn" onclick="processEngine()" class="w-full relative group overflow-hidden bg-gradient-to-r from-rose-500 to-red-600 text-white font-black text-lg py-4 rounded-2xl shadow-lg shadow-rose-500/30 transition-all duration-300 transform hover:-translate-y-1">
            <span id="btnText" class="relative z-10 flex items-center justify-center gap-2">
                <i class="fa-solid fa-lock text-yellow-200"></i> ENCRYPT DOCUMENT
            </span>
        </button>

        <div id="successPopup" class="absolute inset-0 bg-white/95 backdrop-blur-xl hidden flex-col items-center justify-center p-8 rounded-[2.5rem] z-50 transition-all duration-300 opacity-0 scale-95">
            <div class="w-16 h-16 bg-gradient-to-tr from-green-400 to-emerald-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-green-500/30 mb-6">
                <i class="fa-solid fa-check text-3xl"></i>
            </div>
            <h2 id="popupTitle" class="text-2xl font-black text-slate-800 mb-6 text-center tracking-tight">PDF Secured Successfully!</h2>
            
            <div class="flex space-x-4 w-full mb-6">
                <div class="flex-1 bg-slate-50 border border-slate-100 rounded-2xl p-4 text-center">
                    <p class="text-slate-400 text-[10px] font-extrabold uppercase tracking-widest mb-1">Input Size</p>
                    <p id="valLeft" class="text-slate-700 text-xl font-black">0 KB</p>
                </div>
                <div class="flex-1 bg-rose-50 border border-rose-100 rounded-2xl p-4 text-center">
                    <p class="text-rose-500 text-[10px] font-extrabold uppercase tracking-widest mb-1">Output Size</p>
                    <p id="valRight" class="text-slate-700 text-xl font-black">0 KB</p>
                </div>
            </div>

            <div id="popSave" class="w-full bg-emerald-50 border border-emerald-100 rounded-xl py-3 text-center mb-8 font-bold text-emerald-700 text-xs tracking-wide">
                ✨ Security Matrix Compilation finished safely!
            </div>

            <div class="flex w-full space-x-3">
                <button onclick="closePopup()" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-2xl transition-colors text-sm border border-slate-200">Close</button>
                <a id="downloadLnk" href="#" class="w-2/3 flex items-center justify-center gap-2 bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-2xl shadow-lg transition-colors text-sm">
                    <i class="fa-solid fa-download text-lg"></i> Download File
                </a>
            </div>
        </div>

    </div>

    <script>
        let selectedFile = null;
        let currentMode = 'protect'; // Engine mode variable tracker

        function toggleSwapMode() {
            const icon = document.getElementById('swapIcon');
            icon.style.transform = icon.style.transform === 'rotate(180deg)' ? 'rotate(0deg)' : 'rotate(180deg)';
            clearFile();

            if (currentMode === 'protect') {
                currentMode = 'unlock';
                document.getElementById('toolTitle').innerText = "Unlock PDF";
                document.getElementById('toolSub').innerText = "Decrypt and completely remove locks from an encrypted PDF.";
                document.getElementById('dropzoneText').innerText = "Click to upload an Encrypted PDF File";
                document.getElementById('dropzoneIcon').className = "fa-solid fa-lock-open text-emerald-400";
                document.getElementById('pwdLabel').innerText = "Enter Existing Password:";
                document.getElementById('pdfPassword').placeholder = "Enter password to decrypt";
                document.getElementById('btnText').innerHTML = `<i class="fa-solid fa-lock-open text-yellow-200"></i> DECRYPT DOCUMENT`;
            } else {
                currentMode = 'protect';
                document.getElementById('toolTitle').innerText = "Protect PDF";
                document.getElementById('toolSub').innerText = "Encrypt your PDF architecture with a strong custom security key.";
                document.getElementById('dropzoneText').innerText = "Click to Upload target PDF File";
                document.getElementById('dropzoneIcon').className = "fa-solid fa-lock text-rose-400";
                document.getElementById('pwdLabel').innerText = "Set Security Password:";
                document.getElementById('pdfPassword').placeholder = "Enter security passphrase";
                document.getElementById('btnText').innerHTML = `<i class="fa-solid fa-lock text-yellow-200"></i> ENCRYPT DOCUMENT`;
            }
        }

        function triggerUpload() {
            document.getElementById('fileInput').click();
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                document.getElementById('fileName').innerText = selectedFile.name;
                document.getElementById('fileDisplay').classList.remove('hidden');
                document.getElementById('fileDisplay').classList.add('flex');
            }
        });

        function clearFile() {
            selectedFile = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('fileDisplay').classList.add('hidden');
            document.getElementById('fileDisplay').classList.remove('flex');
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('pdfPassword').value = '';
        }

        function processEngine() {
            if (!selectedFile) {
                alert("Please select a PDF file first.");
                return;
            }
            
            const pwd = document.getElementById('pdfPassword').value.trim();
            if (!pwd) {
                alert("Please type the required password!");
                return;
            }

            const btn = document.getElementById('startBtn');
            const pBar = document.getElementById('progressBar');
            
            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin'></i> COMPILING ENCRYPTION MATRICES...";
            btn.classList.add("opacity-80", "pointer-events-none");
            pBar.style.width = '50%';

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('password', pwd);
            formData.append('mode', currentMode);

            fetch('/protect_pdf', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                pBar.style.width = '100%';
                if (data.success) {
                    setTimeout(() => { showPopup(data); }, 600);
                } else {
                    alert("System Matrix Failed: " + data.error);
                    resetBtn();
                }
            })
            .catch(() => {
                alert("A structural security block failed!");
                resetBtn();
            });
        }

        function showPopup(data) {
            const popup = document.getElementById('successPopup');
            popup.classList.remove('hidden');
            setTimeout(() => {
                popup.classList.remove('opacity-0', 'scale-95');
                popup.classList.add('opacity-100', 'scale-100');
            }, 10);
            
            document.getElementById('valLeft').innerText = data.original_kb + " KB";
            document.getElementById('valRight').innerText = data.new_kb + " KB";

            if (currentMode === 'protect') {
                document.getElementById('popupTitle').innerText = "PDF Secured Successfully!";
                document.getElementById('popSave').innerText = "✨ Military Grade Security Key Compiled Perfectly!";
            } else {
                document.getElementById('popupTitle').innerText = "PDF Unlocked Perfectly!";
                document.getElementById('popSave').innerText = "✨ Encryption removed. File layout is completely open!";
            }

            const dlLnk = document.getElementById('downloadLnk');
            dlLnk.href = `data:${data.mime_type};base64,${data.file_data}`;
            dlLnk.download = data.file_name;
            
            resetBtn();
        }

        function closePopup() {
            const popup = document.getElementById('successPopup');
            popup.classList.remove('opacity-100', 'scale-100');
            popup.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                popup.classList.add('hidden');
                popup.classList.remove('flex');
                clearFile();
            }, 300);
        }

        function resetBtn() {
            const btn = document.getElementById('startBtn');
            if (currentMode === 'protect') {
                btn.innerHTML = `<span id="btnText" class="relative z-10 flex items-center justify-center gap-2"><i class="fa-solid fa-lock text-yellow-200"></i> ENCRYPT DOCUMENT</span>`;
            } else {
                btn.innerHTML = `<span id="btnText" class="relative z-10 flex items-center justify-center gap-2"><i class="fa-solid fa-lock-open text-yellow-200"></i> DECRYPT DOCUMENT</span>`;
            }
            btn.classList.remove("opacity-80", "pointer-events-none");
            document.getElementById('progressBar').style.width = '0%';
        }
    </script>
</body>
</html>
