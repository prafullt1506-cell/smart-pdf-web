<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Print Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        body { background-color: #030712; color: #fff; }
        .glass-panel { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid #334155; }
        .card-face-preview { background: #fff; color: #000; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .blueprint-bg { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="p-5">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="glass-panel p-6 rounded-xl">
            <h2 class="text-xl font-bold mb-4">Settings</h2>
            <select id="paperSize" onchange="updatePreview()" class="w-full bg-slate-800 p-2 rounded mb-4">
                <option value="a4">A4 Sheet</option>
                <option value="4x6">4x6 Paper</option>
                <option value="5x7">5x7 Paper</option>
            </select>
            
            <label class="flex items-center gap-2 mb-4">
                <input type="checkbox" id="laminationMode" onchange="updatePreview()"> Lamination Mode
            </label>
            
            <button onclick="executePrintJob()" class="w-full bg-blue-600 p-3 rounded font-bold">Generate Print</button>
        </div>

        <div class="lg:col-span-2 glass-panel p-6 rounded-xl blueprint-bg min-h-[400px] flex items-center justify-center">
            <div id="paperPreview" class="bg-white p-4 shadow-2xl transition-all duration-300"></div>
        </div>
    </div>

    <script>
        let previewUrls = { front: '', back: '' };
        let activeJob = 'id_card';

        function updatePreview() {
            const paperDiv = document.getElementById('paperPreview');
            const paper = document.getElementById('paperSize').value;
            const lamination = document.getElementById('laminationMode').checked;
            
            paperDiv.innerHTML = '';
            paperDiv.style.display = 'flex';
            paperDiv.style.position = 'relative';
            
            // Paper Dimensions Preview scale
            paperDiv.style.width = (paper === 'a4') ? '300px' : '200px';
            paperDiv.style.height = (paper === 'a4') ? '420px' : '300px';

            if(lamination) {
                paperDiv.style.flexDirection = 'row';
                paperDiv.style.justifyContent = 'center';
                paperDiv.style.gap = '10px';
                
                // Fold Line
                const line = document.createElement('div');
                line.style.position = 'absolute';
                line.style.left = '50%'; line.style.height = '100%';
                line.style.borderLeft = '2px dashed black';
                paperDiv.appendChild(line);
            } else {
                paperDiv.style.flexDirection = 'column';
                paperDiv.style.gap = '20px';
            }

            const createCard = (url, isBack = false) => {
                const d = document.createElement('div');
                d.className = 'card-face-preview';
                d.style.width = '100px'; d.style.height = '60px';
                // Rotate back if lamination
                if(isBack && lamination) d.style.transform = 'rotate(180deg)';
                d.innerText = isBack ? 'BACK' : 'FRONT';
                return d;
            };

            paperDiv.appendChild(createCard(previewUrls.front, false));
            paperDiv.appendChild(createCard(previewUrls.back, true));
        }

        async function executePrintJob() {
            // Backend call logic here
            alert("Generating with rotation and fold line logic...");
        }

        updatePreview();
    </script>
</body>
</html>
