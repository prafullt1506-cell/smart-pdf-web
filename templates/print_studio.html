<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Print Studio - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        body { background-color: #070c16; color: #e2e8f0; }
        .studio-panel { background-color: #111c30; border: 1px solid #1e2d4a; }
        .cyan-glow-btn { background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); transition: all 0.3s ease; color: white; border: none; }
        .cyan-glow-btn:hover { box-shadow: 0 0 30px rgba(6, 182, 212, 0.8); transform: translateY(-2px); }
        .tab-btn { transition: all 0.3s ease; border: 2px solid transparent; }
        .tab-active { background-color: rgba(6, 182, 212, 0.15); border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
        .tab-inactive { background-color: #0b1324; border-color: #1e293b; opacity: 0.5; }
        
        #paperPreview { background-color: white; box-shadow: 0 20px 40px rgba(0,0,0,0.6); transition: all 0.3s ease; position: relative; display: flex; }
        .card-face-preview { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 4px; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center;}
        .card-face-preview img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col">
    
    <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur px-8 py-4 flex justify-between items-center shadow-md">
        <h1 class="text-md font-black tracking-widest text-slate-100 uppercase">Pro Print Studio</h1>
        <a href="/" class="px-5 py-2 bg-slate-900 hover:bg-slate-800 text-xs font-bold rounded-lg border border-slate-800">Dashboard</a>
    </header>

    <main class="container mx-auto px-6 py-6 flex-grow flex flex-col lg:grid lg:grid-cols-12 gap-6 relative">
        <section class="lg:col-span-4 flex flex-col gap-4">
            <div class="studio-panel p-5 rounded-xl flex flex-col gap-4 h-full shadow-xl overflow-y-auto">
                
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" id="tabIdCard" onclick="setJobType('id_card')" class="tab-btn tab-active py-4 px-2 rounded-xl flex flex-col items-center">
                        <i class="fa-solid fa-id-card-clip text-xl mb-1 text-cyan-400"></i>
                        <span class="text-[10px] font-black tracking-wider">ID CARD STUDIO</span>
                    </button>
                    <button type="button" id="tabPassport" onclick="setJobType('passport')" class="tab-btn tab-inactive py-4 px-2 rounded-xl flex flex-col items-center">
                        <i class="fa-solid fa-camera text-xl mb-1"></i>
                        <span class="text-[10px] font-black tracking-wider">PHOTO STUDIO</span>
                    </button>
                </div>

                <div id="uploadGroup" class="flex flex-col gap-4 bg-slate-950/40 p-4 rounded-xl border border-slate-900">
                    <div id="idInputs" class="grid grid-cols-2 gap-3">
                        <label class="flex flex-col items-center cursor-pointer">
                            <input type="file" id="idFront" onchange="triggerCropModal(event, 'front')" class="sr-only">
                            <div class="w-full h-16 border border-dashed border-slate-700 rounded-lg flex items-center justify-center bg-slate-900"><i class="fa-solid fa-crop"></i></div>
                            <span class="text-[9px] mt-1 uppercase">Front Side</span>
                        </label>
                        <label class="flex flex-col items-center cursor-pointer">
                            <input type="file" id="idBack" onchange="triggerCropModal(event, 'back')" class="sr-only">
                            <div class="w-full h-16 border border-dashed border-slate-700 rounded-lg flex items-center justify-center bg-slate-900"><i class="fa-solid fa-crop"></i></div>
                            <span class="text-[9px] mt-1 uppercase">Back Side</span>
                        </label>
                    </div>
                    <div id="photoInput" class="hidden">
                        <label class="flex flex-col items-center cursor-pointer">
                            <input type="file" id="passportPhoto" onchange="triggerCropModal(event, 'photo')" class="sr-only">
                            <div class="w-full h-16 border border-dashed border-slate-700 rounded-lg flex items-center justify-center bg-slate-900"><i class="fa-solid fa-user-plus"></i></div>
                            <span class="text-[9px] mt-1 uppercase">Passport Image</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Select Paper</label>
                    <select id="paperSize" onchange="handlePaperChange()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold">
                        <option value="a4">A4 SHEET (Standard)</option>
                        <option value="4x6">4x6 PHOTO PAPER</option>
                    </select>
                </div>

                <div id="passportControls" class="hidden">
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Photo Count (A4: 36 | 4x6: 8)</label>
                    <input type="number" id="photoCount" value="36" min="1" max="36" oninput="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold text-white">
                </div>

                <div id="laminationGroup">
                    <label class="flex items-center gap-3 cursor-pointer bg-slate-900 p-3 rounded-xl border border-slate-800">
                        <input type="checkbox" id="laminationMode" onchange="updatePreview()" class="w-5 h-5">
                        <span class="text-xs font-black uppercase text-cyan-400">Lamination Mode</span>
                    </label>
                </div>

                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 mt-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-4"><i class="fa-solid fa-wand-magic-sparkles text-cyan-500 mr-1"></i> Graphics Settings</label>
                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between text-xs text-slate-300 font-bold mb-1"><span>Brightness</span> <span id="br_val">1.0</span></div>
                            <input type="range" id="brightness" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full accent-cyan-500" oninput="document.getElementById('br_val').innerText = this.value">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-slate-300 font-bold mb-1"><span>Contrast</span> <span id="cr_val">1.0</span></div>
                            <input type="range" id="contrast" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full accent-cyan-500" oninput="document.getElementById('cr_val').innerText = this.value">
                        </div>
                        <div>
                            <div class="flex justify-between text-xs text-slate-300 font-bold mb-1"><span>Sharpness</span> <span id="sh_val">1.0</span></div>
                            <input type="range" id="sharpness" min="0.0" max="3.0" step="0.1" value="1.0" class="w-full accent-cyan-500" oninput="document.getElementById('sh_val').innerText = this.value">
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <section class="lg:col-span-8 flex flex-col">
            <div class="studio-panel rounded-xl shadow-2xl h-full flex flex-col overflow-hidden">
                <div class="bg-slate-950/80 p-4 border-b border-slate-800 flex justify-between items-center">
                    <h2 class="text-xs font-black uppercase tracking-widest">Live Document Preview</h2>
                </div>
                <div class="flex-grow bg-[#090f1c] p-6 flex justify-center items-start overflow-auto min-h-[500px]">
                    <div id="paperPreview" class="shadow-2xl"></div>
                </div>
                <div class="bg-slate-950/80 p-4 border-t border-slate-800">
                    <button id="generateBtn" onclick="executePrintJob()" class="cyan-glow-btn w-full py-4 text-xs font-black uppercase tracking-widest">
                        <i class="fa-solid fa-bolt mr-1"></i> Generate HD Print Sheet
                    </button>
                </div>
            </div>
        </section>

        <div id="cropModal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-[100] hidden flex flex-col items-center justify-center p-4 opacity-0 transition-opacity">
            <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-2xl overflow-hidden shadow-2xl">
                <div class="p-4 border-b border-slate-800 flex justify-between bg-slate-950">
                    <h3 class="text-xs font-black uppercase">Adjust Cut Area</h3>
                    <button onclick="closeCropModal()"><i class="fa-solid fa-xmark text-white"></i></button>
                </div>
                <div class="p-4 bg-black h-[50vh] flex items-center justify-center">
                    <img id="cropTarget" class="max-h-full">
                </div>
                <div class="p-4 bg-slate-950 flex justify-between">
                    <div class="flex gap-2">
                        <button onclick="cropper.rotate(-90)" class="px-4 py-2 bg-slate-800 rounded-lg"><i class="fa-solid fa-rotate-left"></i></button>
                        <button onclick="cropper.rotate(90)" class="px-4 py-2 bg-slate-800 rounded-lg"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                    <button onclick="saveCrop()" class="cyan-glow-btn px-8 py-2 rounded-lg font-black text-xs uppercase">Save & Apply</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let activeJob = 'id_card';
        let cropper = null;
        let currentType = '';
        let blobs = { front: null, back: null, photo: null };
        let previewUrls = { front: '', back: '', photo: '' };

        function setJobType(job) {
            activeJob = job;
            document.getElementById('tabIdCard').className = (job === 'id_card') ? "tab-btn tab-active py-4 px-2 rounded-xl flex flex-col items-center" : "tab-btn tab-inactive py-4 px-2 rounded-xl flex flex-col items-center";
            document.getElementById('tabPassport').className = (job === 'passport') ? "tab-btn tab-active py-4 px-2 rounded-xl flex flex-col items-center" : "tab-btn tab-inactive py-4 px-2 rounded-xl flex flex-col items-center";
            document.getElementById('idInputs').style.display = (job === 'id_card') ? 'grid' : 'none';
            document.getElementById('photoInput').style.display = (job === 'passport') ? 'block' : 'none';
            document.getElementById('passportControls').style.display = (job === 'passport') ? 'block' : 'none';
            document.getElementById('laminationGroup').style.display = (job === 'id_card') ? 'block' : 'none';
            handlePaperChange(); // Auto update photo count based on paper
        }

        // 🎯 DYNAMIC PHOTO COUNT LOGIC
        function handlePaperChange() {
            const paper = document.getElementById('paperSize').value;
            const countInput = document.getElementById('photoCount');
            if(paper === 'a4') {
                countInput.max = "36";
                countInput.value = "36";
            } else {
                countInput.max = "8";
                countInput.value = "8";
            }
            updatePreview();
        }

        function triggerCropModal(e, type) {
            const file = e.target.files[0]; if(!file) return;
            currentType = type;
            const img = document.getElementById('cropTarget');
            img.src = URL.createObjectURL(file);
            document.getElementById('cropModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('cropModal').classList.remove('opacity-0'), 10);
            if(cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: (activeJob==='id_card' ? 1.6 : 0.77), viewMode: 1 });
            e.target.value = '';
        }

        function closeCropModal() {
            document.getElementById('cropModal').classList.add('opacity-0');
            setTimeout(() => document.getElementById('cropModal').classList.add('hidden'), 300);
        }

        function saveCrop() {
            cropper.getCroppedCanvas().toBlob(blob => {
                blobs[currentType] = blob;
                previewUrls[currentType] = URL.createObjectURL(blob);
                closeCropModal();
                updatePreview();
            });
        }

        function updatePreview() {
            const paperDiv = document.getElementById('paperPreview');
            const paper = document.getElementById('paperSize').value;
            const lamination = document.getElementById('laminationMode').checked;
            
            paperDiv.innerHTML = '';
            
            // 🎯 Visual Paper Dimensions
            if(activeJob === 'passport' && paper === '4x6') {
                // Landscape 4x6 for photos
                paperDiv.style.width = '350px';
                paperDiv.style.height = '230px'; 
            } else {
                paperDiv.style.width = (paper==='a4') ? '300px' : '220px';
                paperDiv.style.height = (paper==='a4') ? '420px' : '330px';
            }
            
            paperDiv.style.padding = '15px';
            paperDiv.style.flexWrap = 'nowrap';
            paperDiv.style.alignContent = 'normal';

            if(activeJob === 'id_card') {
                const cardW = (paper==='a4') ? '140px' : '170px';
                const cardH = (paper==='a4') ? '90px' : '110px';
                
                if(paper === 'a4') {
                    if(lamination) {
                        paperDiv.style.flexDirection = 'row';
                        paperDiv.style.justifyContent = 'center';
                        paperDiv.style.alignItems = 'flex-start';
                        paperDiv.style.gap = '5px';
                        paperDiv.style.borderRight = "none";
                    } else {
                        paperDiv.style.flexDirection = 'column';
                        paperDiv.style.justifyContent = 'flex-start';
                        paperDiv.style.alignItems = 'center';
                        paperDiv.style.gap = '30px'; 
                    }
                } else {
                    paperDiv.style.flexDirection = 'column';
                    paperDiv.style.alignItems = 'center';
                    paperDiv.style.justifyContent = 'center';
                    paperDiv.style.gap = '15px';
                }

                const createCard = (url) => {
                    const d = document.createElement('div');
                    d.className = 'card-face-preview';
                    d.style.width = cardW; d.style.height = cardH;
                    if(url) d.innerHTML = `<img src="${url}">`;
                    return d;
                };
                paperDiv.appendChild(createCard(previewUrls.front));
                paperDiv.appendChild(createCard(previewUrls.back));

            } else {
                // 🎯 PHOTO STUDIO Preview Matrix
                paperDiv.style.flexDirection = 'row';
                paperDiv.style.flexWrap = 'wrap';
                paperDiv.style.justifyContent = 'flex-start';
                paperDiv.style.alignContent = 'flex-start';
                paperDiv.style.gap = (paper==='a4') ? '2px' : '5px';

                let count = document.getElementById('photoCount').value;
                for(let i=0; i<count; i++) {
                    const p = document.createElement('div');
                    p.className = 'card-face-preview border border-gray-300';
                    p.style.width = (paper==='a4') ? '38px' : '65px';
                    p.style.height = (paper==='a4') ? '50px' : '85px';
                    if(previewUrls.photo) p.innerHTML = `<img src="${previewUrls.photo}">`;
                    paperDiv.appendChild(p);
                }
            }
        }

        async function executePrintJob() {
            const btn = document.getElementById('generateBtn');
            const formData = new FormData();
            formData.append('job_type', activeJob);
            formData.append('paper_size', document.getElementById('paperSize').value);
            formData.append('lamination_mode', document.getElementById('laminationMode').checked);
            
            formData.append('brightness', document.getElementById('brightness').value);
            formData.append('contrast', document.getElementById('contrast').value);
            formData.append('sharpness', document.getElementById('sharpness').value);
            
            if(activeJob === 'id_card') {
                if(!blobs.front || !blobs.back) return alert("Please crop both Front and Back sides!");
                formData.append('front_file', blobs.front); 
                formData.append('back_file', blobs.back);
            } else {
                if(!blobs.photo) return alert("Please crop a passport photo!");
                formData.append('passport_file', blobs.photo);
                formData.append('photo_count', document.getElementById('photoCount').value);
            }

            btn.innerHTML = "<i class='fa-solid fa-spinner fa-spin mr-2'></i> Processing...";
            try {
                const res = await fetch('/process-print-studio', { method:'POST', body: formData });
                if(res.ok) {
                    const blob = await res.blob();
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = `Print_Sheet_${new Date().getTime()}.jpg`; 
                    a.click();
                } else {
                    alert("Error generating print.");
                }
            } catch(e) {
                console.error(e);
                alert("Server error.");
            }
            btn.innerHTML = "<i class='fa-solid fa-bolt mr-1'></i> Generate HD Print Sheet";
        }

        setJobType('id_card'); // Initial load
    </script>
</body>
</html>
