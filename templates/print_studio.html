<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Print Studio - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        body { background-color: #070c16; color: #e2e8f0; }
        .studio-panel { background-color: #111c30; border: 1px solid #1e2d4a; }
        .cyan-glow-btn { background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); color: white; border: none; }
        .tab-btn { transition: all 0.3s ease; border: 2px solid transparent; }
        .tab-active { background-color: rgba(6, 182, 212, 0.15); border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
        .tab-inactive { background-color: #0b1324; border-color: #1e293b; opacity: 0.5; }
        #paperPreview { background-color: white; box-shadow: 0 20px 40px rgba(0,0,0,0.6); position: relative; }
        .card-face-preview { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
        .card-face-preview img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col">

    <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur px-8 py-4 flex justify-between items-center shadow-md">
        <h1 class="text-md font-black tracking-widest text-slate-100 uppercase">Pro Print Studio</h1>
        <a href="/" class="px-5 py-2 bg-slate-900 hover:bg-slate-800 text-xs font-bold rounded-lg border border-slate-800">Dashboard</a>
    </header>

    <main class="container mx-auto px-6 py-6 flex-grow flex flex-col lg:grid lg:grid-cols-12 gap-6">
        <section class="lg:col-span-4 flex flex-col gap-4">
            <div class="studio-panel p-5 rounded-xl flex flex-col gap-4 h-full shadow-xl">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-wider">Studio Mode</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="tabIdCard" onclick="setJobType('id_card')" class="tab-btn tab-active py-4 px-2 rounded-xl flex flex-col items-center justify-center text-center">
                            <span class="text-xs font-black tracking-wider text-white">ID CARD</span>
                        </button>
                        <button type="button" id="tabPassport" onclick="setJobType('passport')" class="tab-btn tab-inactive py-4 px-2 rounded-xl flex flex-col items-center justify-center text-center">
                            <span class="text-xs font-black tracking-wider text-slate-400">PHOTO</span>
                        </button>
                    </div>
                </div>

                <div id="uploadGroup" class="grid grid-cols-2 gap-3 bg-slate-950/40 p-3 rounded-xl border border-slate-900">
                    <label class="flex flex-col items-center cursor-pointer">
                        <input type="file" id="idFront" accept="image/*" onchange="triggerCropModal(event, 'front')" class="sr-only">
                        <div class="w-full h-20 border border-dashed border-slate-700 rounded-lg flex items-center justify-center"><i class="fa-solid fa-crop-simple"></i></div>
                        <span class="text-[9px] mt-1">Front</span>
                    </label>
                    <label class="flex flex-col items-center cursor-pointer">
                        <input type="file" id="idBack" accept="image/*" onchange="triggerCropModal(event, 'back')" class="sr-only">
                        <div class="w-full h-20 border border-dashed border-slate-700 rounded-lg flex items-center justify-center"><i class="fa-solid fa-crop-simple"></i></div>
                        <span class="text-[9px] mt-1">Back</span>
                    </label>
                </div>

                <div id="passportUpload" class="hidden flex-col items-center bg-slate-950/40 p-3 rounded-xl border border-slate-900">
                    <input type="file" id="passportPhoto" accept="image/*" onchange="triggerCropModal(event, 'photo')" class="sr-only">
                    <label for="passportPhoto" class="w-full h-20 border border-dashed border-slate-700 rounded-lg flex items-center justify-center cursor-pointer"><i class="fa-solid fa-crop-simple text-xl"></i></label>
                </div>

                <select id="paperSize" onchange="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold text-slate-200">
                    <option value="a4">A4 STANDARD</option>
                    <option value="4x6">4x6 PHOTO PAPER</option>
                </select>

                <div id="passportConfig" class="hidden flex-col gap-2">
                    <input type="number" id="photoCount" value="8" min="1" max="40" oninput="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold text-white">
                </div>

                <label class="flex items-center gap-3 cursor-pointer bg-slate-900 p-3 rounded-xl border border-slate-800">
                    <input type="checkbox" id="laminationMode" onchange="updatePreview()" class="w-5 h-5">
                    <span class="text-xs font-black uppercase text-cyan-400">Lamination Mode</span>
                </label>
            </div>
        </section>

        <section class="lg:col-span-8 flex flex-col">
            <div class="studio-panel rounded-xl shadow-xl h-full flex flex-col overflow-hidden">
                <div class="bg-slate-950/80 p-4 border-b border-slate-800 flex justify-between">
                    <h2 class="text-xs font-black uppercase">Live Blueprint</h2>
                </div>
                <div class="flex-grow bg-[#090f1c] p-6 flex justify-center items-start overflow-auto min-h-[500px]">
                    <div id="paperPreview" class="shadow-2xl"></div>
                </div>
                <div class="bg-slate-950/80 p-4 border-t border-slate-800">
                    <button onclick="executePrintJob()" class="cyan-glow-btn w-full py-4 text-xs font-black uppercase">Generate Sheet</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let activeJob = 'id_card'; let cropper = null; let currentCropType = '';
        let printBlobs = { front: null, back: null, photo: null };
        let previewUrls = { front: '', back: '', photo: '' };

        function setJobType(job) {
            activeJob = job;
            document.getElementById('tabIdCard').className = (job === 'id_card') ? "tab-btn tab-active py-4 px-2 rounded-xl" : "tab-btn tab-inactive py-4 px-2 rounded-xl";
            document.getElementById('tabPassport').className = (job === 'passport') ? "tab-btn tab-active py-4 px-2 rounded-xl" : "tab-btn tab-inactive py-4 px-2 rounded-xl";
            document.getElementById('uploadGroup').style.display = (job === 'id_card') ? 'grid' : 'none';
            document.getElementById('passportUpload').style.display = (job === 'passport') ? 'flex' : 'none';
            document.getElementById('passportConfig').style.display = (job === 'passport') ? 'flex' : 'none';
            updatePreview();
        }

        function triggerCropModal(e, type) {
            const file = e.target.files[0]; if(!file) return;
            currentCropType = type;
            const img = document.getElementById('cropTargetImage');
            img.src = URL.createObjectURL(file);
            document.getElementById('cropModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('cropModal').classList.remove('opacity-0'), 10);
            if(cropper) cropper.destroy();
            cropper = new Cropper(img, { aspectRatio: (activeJob === 'id_card') ? 1.6 : 0.77, viewMode: 1 });
        }

        function saveCrop() {
            cropper.getCroppedCanvas().toBlob((blob) => {
                printBlobs[currentCropType] = blob; previewUrls[currentCropType] = URL.createObjectURL(blob);
                document.getElementById('cropModal').classList.add('opacity-0');
                setTimeout(() => document.getElementById('cropModal').classList.add('hidden'), 300);
                updatePreview();
            });
        }

        function updatePreview() {
            const paperDiv = document.getElementById('paperPreview');
            const paper = document.getElementById('paperSize').value;
            const lamination = document.getElementById('laminationMode').checked;
            
            // RESET LAYOUT
            paperDiv.innerHTML = '';
            paperDiv.style.flexDirection = (activeJob === 'id_card' && !lamination) ? 'column' : 'row';
            paperDiv.style.flexWrap = (activeJob === 'passport') ? 'wrap' : 'nowrap';
            paperDiv.style.justifyContent = 'flex-start';
            paperDiv.style.alignItems = (activeJob === 'id_card' && !lamination) ? 'center' : 'flex-start';
            paperDiv.style.width = (paper === 'a4') ? '300px' : '200px';
            paperDiv.style.height = '420px';

            if(activeJob === 'id_card') {
                // Front / Back Cards
                const createCard = () => {
                    const d = document.createElement('div');
                    d.style.width = '120px'; d.style.height = '80px';
                    d.className = 'card-face-preview';
                    return d;
                };
                paperDiv.appendChild(createCard()); paperDiv.appendChild(createCard());
            } else {
                // Photo Grid
                const count = document.getElementById('photoCount').value;
                for(let i=0; i<count; i++) {
                    const p = document.createElement('div');
                    p.style.width = '40px'; p.style.height = '50px';
                    p.className = 'card-face-preview border';
                    paperDiv.appendChild(p);
                }
            }
        }
        
        async function executePrintJob() { /* (Backend fetch logic remains same) */ }
        function closeCropModal() { document.getElementById('cropModal').classList.add('hidden'); }
        setJobType('id_card');
    </script>
</body>
</html>
