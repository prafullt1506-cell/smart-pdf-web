<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Print Studio - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        studioDark: '#0b1324',
                        studioCard: '#111c30',
                        studioBorder: '#1e2d4a',
                        studioCyan: '#06b6d4'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #070c16; }
        .studio-panel {
            background-color: var(--tw-colors-studioCard);
            border: 1px solid var(--tw-colors-studioBorder);
        }
        /* Glowing effects from preview mockup */
        .cyan-glow-btn {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4);
            transition: all 0.3s ease;
        }
        .cyan-glow-btn:hover {
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.7);
            transform: translateY(-1px);
        }
        .active-tab {
            border: 2px solid #06b6d4;
            box-shadow: inset 0 0 12px rgba(6, 182, 212, 0.2);
            background-color: rgba(6, 182, 212, 0.05);
        }
        /* Canvas sheet styling */
        #paperPreview {
            background-color: white;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            position: relative;
        }
        .card-face-preview {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .card-face-preview img {
            width: 100%; height: 100%; object-fit: cover;
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen font-sans flex flex-col">
    
    <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur px-8 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <span class="text-cyan-400 text-xl"><i class="fa-solid fa-print"></i></span>
            <h1 class="text-md font-black tracking-widest text-slate-100 uppercase">Pro Print Studio <span class="text-cyan-500 font-medium text-xs ml-1 opacity-70">- Enterprise Edition</span></h1>
        </div>
        <a href="/" class="px-4 py-1.5 bg-slate-900 hover:bg-slate-800 text-xs font-bold rounded-lg border border-slate-800 transition-all text-slate-300">Dashboard</a>
    </header>

    <main class="container mx-auto px-6 py-6 flex-grow flex flex-col lg:grid lg:grid-cols-12 gap-6">
        
        <section class="lg:col-span-4 flex flex-col gap-4">
            <div class="studio-panel p-5 rounded-xl flex flex-col gap-4 h-full shadow-xl">
                <h2 class="text-xs font-black tracking-wider text-slate-400 uppercase border-b border-slate-800/60 pb-2">Workspace Controls</h2>
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1.5 tracking-wider">Select Print Job</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="jobIdCard" onclick="setJobType('id_card')" class="active-tab py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center border border-slate-800 transition-all group">
                            <span class="text-sm font-black text-slate-100 group-hover:text-cyan-400">ID CARD STUDIO</span>
                            <span class="text-[9px] font-medium text-slate-400 mt-0.5">(Aadhar, PAN, Voter ID)</span>
                        </button>
                        <button type="button" id="jobPassport" onclick="setJobType('passport')" class="py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center border border-slate-800 transition-all group bg-slate-950/40">
                            <span class="text-sm font-black text-slate-400 group-hover:text-cyan-400">PHOTO STUDIO</span>
                            <span class="text-[9px] font-medium text-slate-500 mt-0.5">(Passport, Stamp, Visa)</span>
                        </button>
                    </div>
                </div>

                <div id="uploadSection" class="flex flex-col gap-3 bg-slate-950/40 p-3 rounded-xl border border-slate-900">
                    
                    <div id="idUploadGroup" class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col items-center">
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wide">Upload Front Image</label>
                            <label class="w-full h-20 border border-dashed border-slate-800 rounded-lg bg-slate-900/60 hover:bg-slate-900 flex flex-col items-center justify-center cursor-pointer transition-all p-1 group relative overflow-hidden">
                                <input type="file" id="idFront" accept="image/*" onchange="handleFileChange('front')" class="sr-only">
                                <div id="frontPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400">
                                    <i class="fa-solid fa-cloud-arrow-up text-lg mb-1"></i>
                                    <span class="text-[10px] font-bold">Upload</span>
                                </div>
                                <img id="frontThumb" class="hidden w-full h-full object-cover rounded-md">
                            </label>
                        </div>
                        <div class="flex flex-col items-center">
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wide">Upload Back Image</label>
                            <label class="w-full h-20 border border-dashed border-slate-800 rounded-lg bg-slate-900/60 hover:bg-slate-900 flex flex-col items-center justify-center cursor-pointer transition-all p-1 group relative overflow-hidden">
                                <input type="file" id="idBack" accept="image/*" onchange="handleFileChange('back')" class="sr-only">
                                <div id="backPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400">
                                    <i class="fa-solid fa-cloud-arrow-up text-lg mb-1"></i>
                                    <span class="text-[10px] font-bold">Upload</span>
                                </div>
                                <img id="backThumb" class="hidden w-full h-full object-cover rounded-md">
                            </label>
                        </div>
                    </div>

                    <div id="passportUploadGroup" class="hidden flex-col items-center w-full">
                        <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wide">Upload Master Portrait Image</label>
                        <label class="w-full h-20 border border-dashed border-slate-800 rounded-lg bg-slate-900/60 hover:bg-slate-900 flex flex-col items-center justify-center cursor-pointer transition-all p-1 group relative overflow-hidden">
                            <input type="file" id="passportPhoto" accept="image/*" onchange="handleFileChange('photo')" class="sr-only">
                            <div id="photoPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400">
                                <i class="fa-solid fa-user-plus text-lg mb-1"></i>
                                <span class="text-[10px] font-bold">Select Image</span>
                            </div>
                            <img id="photoThumb" class="hidden w-16 h-full object-cover rounded-md">
                        </label>
                    </div>
                </div>

                <div id="cardTypeGroup">
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-wider">Card Type</label>
                    <input type="text" id="cardType" placeholder="CARD TYPE (e.g., Aadhar, PAN)" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold text-slate-300 focus:outline-none focus:border-cyan-500 placeholder-slate-600">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-wider">Paper Configuration</label>
                    <select id="paperSize" onchange="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-slate-200 cursor-pointer">
                        <option value="a4">A4 STANDARD</option>
                        <option value="4x6">4x6 PHOTO PAPER</option>
                        <option value="5x7">5x7 PHOTO PAPER</option>
                        <option value="8x10">8x10 PHOTO PAPER</option>
                    </select>
                </div>

                <div id="passportConfigBox" class="hidden flex-col gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-wider">Photo Size</label>
                        <select id="photoSize" onchange="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-slate-200">
                            <option value="passport">Passport 3.5x4.5cm</option>
                            <option value="stamp">Stamp 2x2.5cm</option>
                            <option value="visa">Visa 5x5cm</option>
                            <option value="wallet">Wallet 2.5x3.5in</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-wider">Quantity</label>
                        <input type="number" id="photoCount" value="16" min="1" max="100" oninput="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-white">
                    </div>
                </div>

                <div id="laminationBox" class="mt-2">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" id="laminationMode" onchange="updatePreview()" class="sr-only">
                            <div class="block bg-slate-800 w-11 h-6 rounded-full border border-slate-700 transition-colors"></div>
                            <div class="dot absolute left-1 top-1 bg-slate-400 w-4 h-4 rounded-full transition-all duration-300"></div>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xs font-black text-slate-300 uppercase tracking-wide">Lamination Fold Mode</span>
                            <span class="text-[9px] text-slate-500 font-medium leading-tight">Auto-flip back card for seamless folding.</span>
                        </div>
                    </label>
                </div>
            </div>
        </section>

        <section class="lg:col-span-8 flex flex-col">
            <div class="studio-panel rounded-xl shadow-xl h-full flex flex-col overflow-hidden">
                
                <div class="bg-slate-950/60 border-b border-slate-800/80 px-5 py-3.5">
                    <h2 class="text-xs font-black tracking-widest text-slate-400 uppercase"><i class="fa-solid fa-eye text-cyan-500 mr-2"></i>Live Print Preview</h2>
                </div>
                
                <div class="flex-grow bg-[#090f1c] p-8 flex items-center justify-center overflow-auto relative min-h-[480px]">
                    <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 24px 24px;"></div>
                    
                    <div id="paperPreview" class="p-6 flex shadow-2xl transition-all duration-300">
                        </div>
                </div>

                <div class="bg-slate-950/60 border-t border-slate-800/60 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <div class="flex items-center gap-2 text-[10px] font-bold tracking-wider text-slate-400 uppercase">
                        <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> 
                        300 DPI - High Definition Render Active
                    </div>
                    <button type="button" id="generateBtn" onclick="executePrintJob()" class="cyan-glow-btn text-white font-black text-xs uppercase tracking-widest px-8 py-3.5 rounded-xl flex items-center gap-2">
                        <i class="fa-solid fa-bolt"></i> Generate Print-Ready Sheet
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        let activeJob = 'id_card';
        let frontImgData = '';
        let backImgData = '';
        let photoImgData = '';

        const paperRatios = {
            'a4': { w: 210, h: 297 },
            '4x6': { w: 4, h: 6 },
            '5x7': { w: 5, h: 7 },
            '8x10': { w: 8, h: 10 }
        };

        // File upload thumbnail rendering
        function handleFileChange(type) {
            const input = document.getElementById(type === 'front' ? 'idFront' : (type === 'back' ? 'idBack' : 'passportPhoto'));
            const thumb = document.getElementById(type === 'front' ? 'frontThumb' : (type === 'back' ? 'backThumb' : 'photoThumb'));
            const placeholder = document.getElementById(type === 'front' ? 'frontPlaceholder' : (type === 'back' ? 'backPlaceholder' : 'photoPlaceholder'));
            
            if(input.files && input.files[0]) {
                const url = URL.createObjectURL(input.files[0]);
                if(type === 'front') frontImgData = url;
                if(type === 'back') backImgData = url;
                if(type === 'photo') photoImgData = url;
                
                thumb.src = url;
                thumb.classList.remove('hidden');
                placeholder.classList.add('hidden');
                updatePreview();
            }
        }

        // Lamination toggle style update
        document.getElementById('laminationMode').addEventListener('change', function() {
            const dot = this.parentElement.querySelector('.dot');
            const bg = this.parentElement.querySelector('.block');
            if(this.checked) {
                dot.style.transform = 'translateX(100%)';
                dot.classList.replace('bg-slate-400', 'bg-white');
                bg.classList.replace('bg-slate-800', 'bg-cyan-600');
            } else {
                dot.style.transform = 'translateX(0)';
                dot.classList.replace('bg-white', 'bg-slate-400');
                bg.classList.replace('bg-cyan-600', 'bg-slate-800');
            }
        });

        function setJobType(job) {
            activeJob = job;
            document.getElementById('jobIdCard').className = job === 'id_card' ? "active-tab py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center border border-slate-800 transition-all group" : "py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center border border-slate-800 transition-all group bg-slate-950/40";
            document.getElementById('jobPassport').className = job === 'passport' ? "active-tab py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center border border-slate-800 transition-all group" : "py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center border border-slate-800 transition-all group bg-slate-950/40";
            
            document.getElementById('idUploadGroup').style.display = job === 'id_card' ? 'grid' : 'none';
            document.getElementById('cardTypeGroup').style.display = job === 'id_card' ? 'block' : 'none';
            document.getElementById('laminationBox').style.display = job === 'id_card' ? 'block' : 'none';
            
            document.getElementById('passportUploadGroup').style.display = job === 'passport' ? 'flex' : 'none';
            document.getElementById('passportConfigBox').style.display = job === 'passport' ? 'flex' : 'none';
            
            updatePreview();
        }

        function updatePreview() {
            const paper = document.getElementById('paperSize').value;
            const paperDiv = document.getElementById('paperPreview');
            const lamination = document.getElementById('laminationMode').checked;
            
            const ratio = paperRatios[paper];
            const maxH = 400; // Fixed canvas render bounds
            const finalH = maxH;
            const finalW = (ratio.w / ratio.h) * finalH;
            
            paperDiv.style.height = `${finalH}px`;
            paperDiv.style.width = `${finalW}px`;
            paperDiv.innerHTML = ''; 

            if(activeJob === 'id_card') {
                // Layout Direction mapping: A4 is Left-Right side, smaller photo papers are Top-Bottom
                const isVerticalPaper = (paper === '4x6' || paper === '5x7' || paper === '8x10');
                paperDiv.style.flexDirection = isVerticalPaper ? 'column' : 'row';
                paperDiv.style.alignItems = 'center';
                paperDiv.style.justifyContent = 'center';
                paperDiv.style.gap = '12px';

                const cardW = finalW * (isVerticalPaper ? 0.75 : 0.42);
                const cardH = cardW * (5.4 / 8.5);

                const frontCard = document.createElement('div');
                frontCard.className = 'card-face-preview shadow-sm';
                frontCard.style.width = `${cardW}px`; frontCard.style.height = `${cardH}px`;
                frontCard.innerHTML = frontImgData ? `<img src="${frontImgData}">` : '<span class="text-[9px] font-bold text-slate-300 tracking-wider">FRONT FACE</span>';

                const backCard = document.createElement('div');
                backCard.className = 'card-face-preview shadow-sm';
                backCard.style.width = `${cardW}px`; backCard.style.height = `${cardH}px`;
                backCard.innerHTML = backImgData ? `<img src="${backImgData}">` : '<span class="text-[9px] font-bold text-slate-300 tracking-wider">BACK FACE</span>';

                if(lamination) {
                    if(isVerticalPaper) {
                        backCard.style.transform = 'rotate(180deg)';
                        const line = document.createElement('div');
                        line.className = 'w-[90%] border-t border-dashed border-slate-400 my-1 relative text-center';
                        line.innerHTML = '<span class="absolute left-1/2 -top-2 bg-white px-1 text-[7px] text-slate-500 -translate-x-1/2"><i class="fa-solid fa-scissors"></i> Fold Line</span>';
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(line); paperDiv.appendChild(backCard);
                    } else {
                        const line = document.createElement('div');
                        line.className = 'h-[90%] border-l border-dashed border-slate-400 mx-1 relative';
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(line); paperDiv.appendChild(backCard);
                    }
                } else {
                    paperDiv.appendChild(frontCard); paperDiv.appendChild(backCard);
                }
            } else {
                // Photo Studio Mode Rendering Loop
                paperDiv.style.display = 'flex';
                paperDiv.style.flexWrap = 'wrap';
                paperDiv.style.alignContent = 'flex-start';
                paperDiv.style.justifyContent = 'center';
                paperDiv.style.gap = '4px';
                paperDiv.style.padding = '16px';

                const sizeType = document.getElementById('photoSize').value;
                const count = parseInt(document.getElementById('photoCount').value) || 1;

                let pw = finalW * 0.16; let ph = pw * (4.5 / 3.5);
                if(sizeType === 'stamp') { pw = finalW * 0.11; ph = pw * (2.5 / 2); }
                if(sizeType === 'visa') { pw = finalW * 0.22; ph = pw; }
                if(sizeType === 'wallet') { pw = finalW * 0.28; ph = pw * (3.5 / 2.5); }

                for(let i=0; i<count; i++) {
                    const gridPhoto = document.createElement('div');
                    gridPhoto.className = 'card-face-preview border border-slate-300';
                    gridPhoto.style.width = `${pw}px`; gridPhoto.style.height = `${ph}px`;
                    gridPhoto.innerHTML = photoImgData ? `<img src="${photoImgData}">` : '<i class="fa-solid fa-user text-slate-300 text-[9px]"></i>';
                    paperDiv.appendChild(gridPhoto);
                    if(i >= 48) break; // Visual cap protection
                }
            }
        }

        updatePreview();

        async function executePrintJob() {
            const generateBtn = document.getElementById('generateBtn');
            const paperSize = document.getElementById('paperSize').value;
            const laminationMode = document.getElementById('laminationMode').checked;
            
            const formData = new FormData();
            formData.append('job_type', activeJob);
            formData.append('paper_size', paperSize);
            formData.append('lamination_mode', laminationMode);

            if (activeJob === 'id_card') {
                const front = document.getElementById('idFront').files[0];
                const back = document.getElementById('idBack').files[0];
                if(!front || !back) { alert('Please upload both Front and Back card face images.'); return; }
                formData.append('front_file', front);
                formData.append('back_file', back);
            } else {
                const photo = document.getElementById('passportPhoto').files[0];
                if(!photo) { alert('Please upload a portrait image.'); return; }
                formData.append('passport_file', photo);
                formData.append('photo_size', document.getElementById('photoSize').value);
                formData.append('photo_count', document.getElementById('photoCount').value);
            }

            generateBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin mr-2'></i> COMPILING SHEET...";
            generateBtn.disabled = true;

            try {
                const response = await fetch('/process-print-studio', { method: 'POST', body: formData });
                if(response.ok) {
                    const blob = await response.blob();
                    const dlUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = dlUrl;
                    a.download = `Print_Sheet_${activeJob}_${new Date().getTime()}.jpg`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    alert('Error creating print layout.');
                }
            } catch {
                alert('Network connection error occurred.');
            } finally {
                generateBtn.innerHTML = '<i class="fa-solid fa-bolt"></i> Generate Print-Ready Sheet';
                generateBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
