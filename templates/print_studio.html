<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Print Studio - Ultra UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        /* 🌌 Ultra Dark Theme & Scrollbar */
        body { background-color: #030712; color: #f8fafc; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 4px; }

        /* 🔲 Blueprint Canvas Background */
        .blueprint-bg {
            background-color: #0f172a;
            background-image: 
                linear-gradient(rgba(56, 189, 248, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }

        /* 💎 Glassmorphism Panels */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 🚀 Buttons & Tabs */
        .cyber-btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
            transition: all 0.3s ease;
        }
        .cyber-btn:hover { box-shadow: 0 0 25px rgba(14, 165, 233, 0.7); transform: translateY(-2px); }
        
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 2px solid transparent; }
        .tab-active { background: rgba(14, 165, 233, 0.1); border-color: #0ea5e9; box-shadow: inset 0 0 15px rgba(14, 165, 233, 0.2); }
        .tab-inactive { background: rgba(15, 23, 42, 0.8); border-color: rgba(30, 41, 59, 0.8); opacity: 0.6; }
        .tab-inactive:hover { opacity: 1; border-color: rgba(14, 165, 233, 0.5); }

        /* 📄 Paper Effect */
        #paperPreview { 
            background-color: #ffffff; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.1); 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        /* 🖼️ Photo Grid Styling */
        .card-face-preview { 
            background: #f8fafc; 
            border: 1.5px dashed #94a3b8; 
            border-radius: 4px; 
            overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .card-face-preview:hover { border-color: #0ea5e9; box-shadow: 0 0 10px rgba(14,165,233,0.3); }
        .card-face-preview img { width: 100%; height: 100%; object-fit: cover; }

        /* 🎚️ Modern Toggle Switch */
        .toggle-checkbox:checked { right: 0; border-color: #0ea5e9; }
        .toggle-checkbox:checked + .toggle-label { background-color: #0ea5e9; }
        
        /* 🎛️ Custom Sliders */
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #38bdf8; cursor: pointer; box-shadow: 0 0 10px rgba(56, 189, 248, 0.8); margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans selection:bg-sky-500 selection:text-white">
    
    <header class="border-b border-slate-800/50 bg-slate-950/80 backdrop-blur-md px-8 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-gradient-to-br from-sky-400 to-blue-600 flex items-center justify-center shadow-[0_0_15px_rgba(56,189,248,0.5)]">
                <i class="fa-solid fa-layer-group text-white text-sm"></i>
            </div>
            <h1 class="text-sm font-black tracking-widest text-slate-100 uppercase">Print Studio <span class="text-sky-400">Pro</span></h1>
        </div>
        <a href="/" class="px-5 py-2 bg-slate-800 hover:bg-slate-700 transition text-[10px] font-black tracking-widest uppercase rounded-lg border border-slate-700 text-slate-300 hover:text-white">
            <i class="fa-solid fa-arrow-left mr-2"></i> Dashboard
        </a>
    </header>

    <main class="container mx-auto px-4 lg:px-8 py-6 flex-grow flex flex-col lg:grid lg:grid-cols-12 gap-6 relative">
        
        <section class="lg:col-span-4 flex flex-col gap-5">
            <div class="glass-panel p-6 rounded-2xl flex flex-col gap-5 h-full overflow-y-auto">
                
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" id="tabIdCard" onclick="setJobType('id_card')" class="tab-btn tab-active py-5 px-2 rounded-xl flex flex-col items-center group">
                        <i class="fa-solid fa-id-card-clip text-2xl mb-2 text-sky-400 group-hover:scale-110 transition"></i>
                        <span class="text-[10px] font-black tracking-widest text-slate-200">ID CARD</span>
                    </button>
                    <button type="button" id="tabPassport" onclick="setJobType('passport')" class="tab-btn tab-inactive py-5 px-2 rounded-xl flex flex-col items-center group">
                        <i class="fa-solid fa-user-tie text-2xl mb-2 text-slate-400 group-hover:text-sky-400 group-hover:scale-110 transition"></i>
                        <span class="text-[10px] font-black tracking-widest text-slate-400 group-hover:text-slate-200">PASSPORT</span>
                    </button>
                </div>

                <div id="uploadGroup" class="bg-slate-900/50 p-5 rounded-xl border border-slate-700/50">
                    <div id="idInputs" class="grid grid-cols-2 gap-4">
                        <label class="flex flex-col items-center cursor-pointer group">
                            <input type="file" id="idFront" onchange="triggerCropModal(event, 'front')" class="sr-only">
                            <div class="w-full h-24 border-2 border-dashed border-slate-600 rounded-xl flex flex-col items-center justify-center bg-slate-800/50 group-hover:border-sky-400 group-hover:bg-sky-900/20 transition">
                                <i class="fa-solid fa-cloud-arrow-up text-xl text-slate-400 group-hover:text-sky-400 mb-2"></i>
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Front Side</span>
                            </div>
                        </label>
                        <label class="flex flex-col items-center cursor-pointer group">
                            <input type="file" id="idBack" onchange="triggerCropModal(event, 'back')" class="sr-only">
                            <div class="w-full h-24 border-2 border-dashed border-slate-600 rounded-xl flex flex-col items-center justify-center bg-slate-800/50 group-hover:border-sky-400 group-hover:bg-sky-900/20 transition">
                                <i class="fa-solid fa-cloud-arrow-up text-xl text-slate-400 group-hover:text-sky-400 mb-2"></i>
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Back Side</span>
                            </div>
                        </label>
                    </div>
                    <div id="photoInput" class="hidden">
                        <label class="flex flex-col items-center cursor-pointer group">
                            <input type="file" id="passportPhoto" onchange="triggerCropModal(event, 'photo')" class="sr-only">
                            <div class="w-full h-24 border-2 border-dashed border-slate-600 rounded-xl flex flex-col items-center justify-center bg-slate-800/50 group-hover:border-sky-400 group-hover:bg-sky-900/20 transition">
                                <i class="fa-solid fa-camera-retro text-2xl text-slate-400 group-hover:text-sky-400 mb-2"></i>
                                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Upload Portrait</span>
                            </div>
                        </label>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-700/50 space-y-4">
                    <div>
                        <label class="text-[9px] font-black text-sky-400 uppercase tracking-widest block mb-2"><i class="fa-solid fa-scroll mr-1"></i> Paper Format</label>
                        <select id="paperSize" onchange="handlePaperChange()" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-xs font-bold text-slate-200 focus:outline-none focus:border-sky-500 transition">
                            <option value="a4">A4 SHEET (Standard)</option>
                            <option value="4x6">4x6 PHOTO PAPER</option>
                            <option value="5x7">5x7 PHOTO PAPER</option>
                        </select>
                    </div>

                    <div id="passportControls" class="hidden">
                        <label class="text-[9px] font-black text-sky-400 uppercase tracking-widest block mb-2"><i class="fa-solid fa-layer-group mr-1"></i> Grid Count</label>
                        <input type="number" id="photoCount" value="36" min="1" max="36" oninput="updatePreview()" class="w-full bg-slate-950 border border-slate-700 rounded-lg px-4 py-2.5 text-xs font-bold text-white focus:outline-none focus:border-sky-500 transition">
                    </div>

                    <div id="laminationGroup" class="pt-2">
                        <div class="flex items-center justify-between">
                            <label class="text-[10px] font-black text-slate-300 uppercase tracking-widest">Lamination Mode</label>
                            <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" name="toggle" id="laminationMode" onchange="updatePreview()" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 border-slate-600 appearance-none cursor-pointer z-10 top-0 transition-all duration-300"/>
                                <label for="laminationMode" class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-600 cursor-pointer transition-colors duration-300"></label>
                            </div>
                        </div>
                        <p class="text-[8px] text-slate-500 mt-1">Enables side-by-side layout for folding.</p>
                    </div>
                </div>

                <div class="bg-slate-900/50 p-5 rounded-xl border border-slate-700/50">
                    <label class="text-[9px] font-black text-sky-400 uppercase tracking-widest block mb-4"><i class="fa-solid fa-sliders mr-1"></i> Image Enhancements</label>
                    <div class="space-y-5">
                        <div>
                            <div class="flex justify-between text-[10px] text-slate-300 font-bold mb-2"><span>Brightness</span> <span id="br_val" class="text-sky-400">1.0</span></div>
                            <input type="range" id="brightness" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full" oninput="document.getElementById('br_val').innerText = this.value">
                        </div>
                        <div>
                            <div class="flex justify-between text-[10px] text-slate-300 font-bold mb-2"><span>Contrast</span> <span id="cr_val" class="text-sky-400">1.0</span></div>
                            <input type="range" id="contrast" min="0.5" max="2.0" step="0.1" value="1.0" class="w-full" oninput="document.getElementById('cr_val').innerText = this.value">
                        </div>
                        <div>
                            <div class="flex justify-between text-[10px] text-slate-300 font-bold mb-2"><span>Sharpness</span> <span id="sh_val" class="text-sky-400">1.0</span></div>
                            <input type="range" id="sharpness" min="0.0" max="3.0" step="0.1" value="1.0" class="w-full" oninput="document.getElementById('sh_val').innerText = this.value">
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <section class="lg:col-span-8 flex flex-col h-[85vh] lg:h-auto">
            <div class="glass-panel rounded-2xl flex flex-col overflow-hidden h-full border border-slate-700/50 relative">
                
                <div class="bg-slate-900/80 p-3 px-5 border-b border-slate-700/50 flex justify-between items-center backdrop-blur-sm z-10">
                    <div class="flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                        <h2 class="text-[10px] font-black uppercase tracking-widest text-slate-300">Live Canvas Rendering</h2>
                    </div>
                    <span class="text-[9px] font-bold text-slate-500 bg-slate-800 px-2 py-1 rounded">300 DPI ENGINE</span>
                </div>
                
                <div class="flex-grow blueprint-bg p-8 flex justify-center items-center overflow-auto relative">
                    <div id="paperPreview" class="relative"></div>
                </div>
                
                <div class="bg-slate-900/90 p-4 border-t border-slate-700/50 backdrop-blur-md z-10">
                    <button id="generateBtn" onclick="executePrintJob()" class="cyber-btn w-full py-4 rounded-xl text-xs font-black uppercase tracking-widest text-white flex items-center justify-center gap-2">
                        <i class="fa-solid fa-print"></i> Generate HD Print File
                    </button>
                </div>
            </div>
        </section>

        <div id="cropModal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-[100] hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-3xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,1)]">
                <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                    <h3 class="text-xs font-black uppercase tracking-widest text-sky-400"><i class="fa-solid fa-crop-simple mr-2"></i> Crop Tool</h3>
                    <button onclick="closeCropModal()" class="text-slate-400 hover:text-white transition"><i class="fa-solid fa-xmark text-lg"></i></button>
                </div>
                <div class="bg-black h-[60vh] flex items-center justify-center">
                    <img id="cropTarget" class="max-h-full">
                </div>
                <div class="p-4 bg-slate-950 flex justify-between items-center">
                    <div class="flex gap-2">
                        <button onclick="cropper.rotate(-90)" class="w-10 h-10 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-lg transition text-slate-300"><i class="fa-solid fa-rotate-left"></i></button>
                        <button onclick="cropper.rotate(90)" class="w-10 h-10 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-lg transition text-slate-300"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                    <button onclick="saveCrop()" class="cyber-btn px-8 py-3 rounded-lg font-black text-[10px] uppercase tracking-widest">Apply Mask</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let activeJob = 'id_card';
        let cropper = null;
        let currentType = '';
        let blobs = { front: null, back: null, photo: null };
        let previewUrls = { front: '', back: '', photo: '' };

        function setJobType(job) {
            activeJob = job;
            document.getElementById('tabIdCard').className = (job === 'id_card') ? "tab-btn tab-active py-5 px-2 rounded-xl flex flex-col items-center group" : "tab-btn tab-inactive py-5 px-2 rounded-xl flex flex-col items-center group";
            document.getElementById('tabPassport').className = (job === 'passport') ? "tab-btn tab-active py-5 px-2 rounded-xl flex flex-col items-center group" : "tab-btn tab-inactive py-5 px-2 rounded-xl flex flex-col items-center group";
            
            // Adjust icons coloring based on active state
            document.querySelector('#tabIdCard i').className = (job === 'id_card') ? "fa-solid fa-id-card-clip text-2xl mb-2 text-sky-400 transition" : "fa-solid fa-id-card-clip text-2xl mb-2 text-slate-400 group-hover:text-sky-400 transition";
            document.querySelector('#tabPassport i').className = (job === 'passport') ? "fa-solid fa-user-tie text-2xl mb-2 text-sky-400 transition" : "fa-solid fa-user-tie text-2xl mb-2 text-slate-400 group-hover:text-sky-400 transition";

            document.getElementById('idInputs').style.display = (job === 'id_card') ? 'grid' : 'none';
            document.getElementById('photoInput').style.display = (job === 'passport') ? 'block' : 'none';
            document.getElementById('passportControls').style.display = (job === 'passport') ? 'block' : 'none';
            document.getElementById('laminationGroup').style.display = (job === 'id_card') ? 'block' : 'none';
            handlePaperChange(); 
        }

        function handlePaperChange() {
            const paper = document.getElementById('paperSize').value;
            const countInput = document.getElementById('photoCount');
            if(paper === 'a4') { countInput.max = "36"; countInput.value = "36"; } 
            else if(paper === '5x7') { countInput.max = "15"; countInput.value = "15"; } 
            else { countInput.max = "8"; countInput.value = "8"; }
            updatePreview();
        }

        function triggerCropModal(e, type) {
            const file = e.target.files[0]; if(!file) return;
            currentType = type;
            const img = document.getElementById('cropTarget');
            img.src = URL.createObjectURL(file);
            document.getElementById('cropModal').style.display = 'flex';
            setTimeout(() => document.getElementById('cropModal').classList.remove('opacity-0'), 10);
            if(cropper) cropper.destroy();
            cropper = new Cropper(img, { 
                aspectRatio: (activeJob==='id_card' ? 1.6 : 0.77), 
                viewMode: 1,
                background: false // Clean look in modal
            });
            e.target.value = '';
        }

        function closeCropModal() {
            document.getElementById('cropModal').classList.add('opacity-0');
            setTimeout(() => { document.getElementById('cropModal').style.display = 'none'; }, 300);
        }

        function saveCrop() {
            cropper.getCroppedCanvas().toBlob(blob => {
                blobs[currentType] = blob;
                previewUrls[currentType] = URL.createObjectURL(blob);
                closeCropModal();
                updatePreview();
            });
        }

        function updatePreview() {
            const paperDiv = document.getElementById('paperPreview');
            const paper = document.getElementById('paperSize').value;
            const lamination = document.getElementById('laminationMode').checked;
            
            paperDiv.innerHTML = '';
            
            // 🎯 Visual Paper Dimensions Scale
            if(activeJob === 'passport') {
                paperDiv.style.width = (paper==='a4') ? '340px' : ((paper==='5x7') ? '380px' : '360px');
                paperDiv.style.height = (paper==='a4') ? '480px' : ((paper==='5x7') ? '270px' : '200px'); 
                paperDiv.style.padding = '25px';
            } else {
                paperDiv.style.width = (paper==='a4') ? '320px' : '240px';
                paperDiv.style.height = (paper==='a4') ? '450px' : '350px';
                paperDiv.style.padding = '15px';
            }

            if(activeJob === 'id_card') {
                paperDiv.style.display = 'flex';
                const cardW = (paper==='a4') ? '150px' : '180px';
                const cardH = (paper==='a4') ? '95px' : '115px';
                
                if(paper === 'a4') {
                    if(lamination) {
                        paperDiv.style.flexDirection = 'row';
                        paperDiv.style.justifyContent = 'center';
                        paperDiv.style.alignItems = 'flex-start';
                        paperDiv.style.gap = '8px';
                    } else {
                        paperDiv.style.flexDirection = 'column';
                        paperDiv.style.justifyContent = 'flex-start';
                        paperDiv.style.alignItems = 'center';
                        paperDiv.style.gap = '35px'; 
                    }
                } else {
                    paperDiv.style.flexDirection = 'column';
                    paperDiv.style.alignItems = 'center';
                    paperDiv.style.justifyContent = 'center';
                    paperDiv.style.gap = '20px';
                }

                const createCard = (url) => {
                    const d = document.createElement('div');
                    d.className = 'card-face-preview';
                    d.style.width = cardW; d.style.height = cardH;
                    if(url) d.innerHTML = `<img src="${url}">`;
                    else d.innerHTML = `<i class="fa-solid fa-id-card text-slate-300 text-3xl opacity-50"></i>`;
                    return d;
                };
                paperDiv.appendChild(createCard(previewUrls.front));
                paperDiv.appendChild(createCard(previewUrls.back));

            } else {
                // 🎯 CSS Grid Logic
                paperDiv.style.display = 'grid';
                if(paper === 'a4') {
                    paperDiv.style.gridTemplateColumns = 'repeat(6, 1fr)';
                    paperDiv.style.gap = '6px';
                } else if(paper === '5x7') {
                    paperDiv.style.gridTemplateColumns = 'repeat(5, 1fr)';
                    paperDiv.style.gap = '8px';
                } else {
                    paperDiv.style.gridTemplateColumns = 'repeat(4, 1fr)';
                    paperDiv.style.gap = '10px';
                }

                let count = document.getElementById('photoCount').value;
                for(let i=0; i<count; i++) {
                    const p = document.createElement('div');
                    p.className = 'card-face-preview';
                    p.style.aspectRatio = '3.5/4.5';
                    if(previewUrls.photo) p.innerHTML = `<img src="${previewUrls.photo}">`;
                    else p.innerHTML = `<i class="fa-solid fa-user text-slate-300 opacity-50"></i>`;
                    paperDiv.appendChild(p);
                }
            }
        }

        async function executePrintJob() {
            const btn = document.getElementById('generateBtn');
            const formData = new FormData();
            formData.append('job_type', activeJob);
            formData.append('paper_size', document.getElementById('paperSize').value);
            formData.append('lamination_mode', document.getElementById('laminationMode').checked);
            
            formData.append('brightness', document.getElementById('brightness').value);
            formData.append('contrast', document.getElementById('contrast').value);
            formData.append('sharpness', document.getElementById('sharpness').value);
            
            if(activeJob === 'id_card') {
                if(!blobs.front || !blobs.back) return alert("Please crop both Front and Back sides!");
                formData.append('front_file', blobs.front); 
                formData.append('back_file', blobs.back);
            } else {
                if(!blobs.photo) return alert("Please crop a portrait photo!");
                formData.append('passport_file', blobs.photo);
                formData.append('photo_count', document.getElementById('photoCount').value);
            }

            btn.innerHTML = "<i class='fa-solid fa-circle-notch fa-spin mr-2'></i> Generating Engine...";
            btn.style.opacity = '0.8';
            try {
                const res = await fetch('/process-print-studio', { method:'POST', body: formData });
                if(res.ok) {
                    const blob = await res.blob();
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = `StudioPro_${new Date().getTime()}.jpg`; 
                    a.click();
                } else {
                    alert("Error generating print. Please check server logs.");
                }
            } catch(e) {
                console.error(e);
                alert("Connection error.");
            }
            btn.innerHTML = "<i class='fa-solid fa-print mr-2'></i> Generate HD Print File";
            btn.style.opacity = '1';
        }

        setJobType('id_card'); 
    </script>
</body>
</html>
