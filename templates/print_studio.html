<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Print Studio - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { studioDark: '#0b1324', studioCard: '#111c30', studioBorder: '#1e2d4a', studioCyan: '#06b6d4' } }
            }
        }
    </script>
    <style>
        body { background-color: #070c16; color: #e2e8f0; }
        .studio-panel { background-color: #111c30; border: 1px solid #1e2d4a; }
        .cyan-glow-btn {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5); transition: all 0.3s ease; color: white; border: none;
        }
        .cyan-glow-btn:hover { box-shadow: 0 0 30px rgba(6, 182, 212, 0.8); transform: translateY(-2px); }
        .tab-btn { transition: all 0.3s ease; border: 2px solid transparent; }
        .tab-active { background-color: rgba(6, 182, 212, 0.15); border-color: #06b6d4; box-shadow: 0 0 15px rgba(6, 182, 212, 0.3); }
        .tab-inactive { background-color: #0b1324; border-color: #1e293b; opacity: 0.4; }
        .tab-inactive:hover { opacity: 0.7; }
        #paperPreview { background-color: white; box-shadow: 0 20px 40px rgba(0,0,0,0.6); transition: all 0.3s ease; position: relative; padding: 3%; }
        .card-face-preview { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 4px; overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center;}
        .card-face-preview img { width: 100%; height: 100%; object-fit: cover; }
        .cropper-modal { background-color: rgba(0,0,0,0.85); }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col">
    
    <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur px-8 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <span class="text-cyan-400 text-2xl"><i class="fa-solid fa-print"></i></span>
            <h1 class="text-md font-black tracking-widest text-slate-100 uppercase">Pro Print Studio</h1>
        </div>
        <a href="/" class="px-5 py-2 bg-slate-900 hover:bg-slate-800 text-xs font-bold rounded-lg border border-slate-800 transition-all">Dashboard</a>
    </header>

    <main class="container mx-auto px-6 py-6 flex-grow flex flex-col lg:grid lg:grid-cols-12 gap-6 relative">
        <section class="lg:col-span-4 flex flex-col gap-4">
            <div class="studio-panel p-5 rounded-xl flex flex-col gap-5 h-full shadow-xl">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-2 tracking-wider">Select Studio Mode</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="tabIdCard" onclick="setJobType('id_card')" class="tab-btn tab-active py-4 px-2 rounded-xl flex flex-col items-center justify-center text-center">
                            <i class="fa-solid fa-id-card-clip text-2xl mb-1 text-cyan-400" id="iconIdCard"></i>
                            <span class="text-xs font-black tracking-wider text-white" id="textIdCard">ID CARD STUDIO</span>
                            <span id="badgeIdCard" class="bg-cyan-500 text-slate-950 text-[9px] font-black px-2 py-0.5 rounded-full mt-2 uppercase tracking-widest shadow-[0_0_10px_rgba(6,182,212,0.8)]">● Active</span>
                        </button>
                        <button type="button" id="tabPassport" onclick="setJobType('passport')" class="tab-btn tab-inactive py-4 px-2 rounded-xl flex flex-col items-center justify-center text-center">
                            <i class="fa-solid fa-camera-retro text-2xl mb-1 text-slate-500" id="iconPassport"></i>
                            <span class="text-xs font-black tracking-wider text-slate-400" id="textPassport">PHOTO STUDIO</span>
                            <span id="badgePassport" class="hidden bg-cyan-500 text-slate-950 text-[9px] font-black px-2 py-0.5 rounded-full mt-2 uppercase tracking-widest shadow-[0_0_10px_rgba(6,182,212,0.8)]">● Active</span>
                        </button>
                    </div>
                </div>

                <div id="uploadSection" class="flex flex-col gap-3 bg-slate-950/40 p-4 rounded-xl border border-slate-900">
                    <div id="idUploadGroup" class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col items-center">
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1">Front Face</label>
                            <label class="w-full h-24 border border-dashed border-slate-700 rounded-lg bg-slate-900 hover:bg-slate-800 flex flex-col items-center justify-center cursor-pointer p-1 group">
                                <input type="file" id="idFront" accept="image/*" onchange="triggerCropModal(event, 'front')" class="sr-only">
                                <div id="frontPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400"><i class="fa-solid fa-crop-simple text-xl mb-1"></i><span class="text-[10px] font-bold">Crop Front</span></div>
                                <img id="frontThumb" class="hidden w-full h-full object-contain rounded">
                            </label>
                        </div>
                        <div class="flex flex-col items-center">
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1">Back Face</label>
                            <label class="w-full h-24 border border-dashed border-slate-700 rounded-lg bg-slate-900 hover:bg-slate-800 flex flex-col items-center justify-center cursor-pointer p-1 group">
                                <input type="file" id="idBack" accept="image/*" onchange="triggerCropModal(event, 'back')" class="sr-only">
                                <div id="backPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400"><i class="fa-solid fa-crop-simple text-xl mb-1"></i><span class="text-[10px] font-bold">Crop Back</span></div>
                                <img id="backThumb" class="hidden w-full h-full object-contain rounded">
                            </label>
                        </div>
                    </div>

                    <div id="passportUploadGroup" class="hidden flex-col items-center w-full">
                        <label class="text-[9px] font-bold text-slate-400 uppercase mb-1">Master Portrait Image</label>
                        <label class="w-full h-24 border border-dashed border-slate-700 rounded-lg bg-slate-900 hover:bg-slate-800 flex flex-col items-center justify-center cursor-pointer p-1 group">
                            <input type="file" id="passportPhoto" accept="image/*" onchange="triggerCropModal(event, 'photo')" class="sr-only">
                            <div id="photoPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400"><i class="fa-solid fa-crop-simple text-xl mb-1"></i><span class="text-[10px] font-bold">Crop Portrait</span></div>
                            <img id="photoThumb" class="hidden h-full object-contain rounded">
                        </label>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Paper Selection</label>
                    <select id="paperSize" onchange="enforceSmartLimits(); updatePreview();" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-slate-200">
                        <option value="a4">A4 STANDARD</option>
                        <option value="4x6">4x6 PHOTO PAPER</option>
                        <option value="5x7">5x7 PHOTO PAPER</option>
                    </select>
                </div>

                <div id="passportConfigBox" class="hidden flex-col gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1">Photo Size</label>
                        <select id="photoSize" onchange="enforceSmartLimits(); updatePreview();" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-slate-200">
                            <option value="passport">Standard Passport (3.5x4.5cm)</option>
                            <option value="stamp">Stamp Size (2x2.5cm)</option>
                        </select>
                    </div>
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="text-[10px] font-bold text-slate-500 uppercase block">Total Quantity</label>
                            <span id="limitWarning" class="text-[9px] font-bold text-rose-400 hidden">Max Limit Reached</span>
                        </div>
                        <input type="number" id="photoCount" value="8" min="1" max="40" oninput="enforceSmartLimits(); updatePreview();" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-white">
                    </div>
                </div>

                <div id="laminationBox" class="mt-2">
                    <label class="flex items-center gap-3 cursor-pointer bg-slate-900 p-3 rounded-xl border border-slate-800">
                        <div class="relative">
                            <input type="checkbox" id="laminationMode" onchange="updatePreview()" class="sr-only">
                            <div class="block bg-slate-950 w-11 h-6 rounded-full border border-slate-700 transition-colors"></div>
                            <div class="dot absolute left-1 top-1 bg-slate-400 w-4 h-4 rounded-full transition-all duration-300"></div>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xs font-black text-cyan-400 uppercase tracking-wide">Lamination Mode</span>
                        </div>
                    </label>
                </div>
            </div>
        </section>

        <section class="lg:col-span-8 flex flex-col">
            <div class="studio-panel rounded-xl shadow-2xl h-full flex flex-col overflow-hidden">
                <div class="bg-slate-950/80 border-b border-slate-800 px-5 py-3.5 flex justify-between items-center">
                    <h2 class="text-xs font-black tracking-widest text-slate-300 uppercase"><i class="fa-solid fa-eye text-cyan-500 mr-2"></i>Live Print Blueprint</h2>
                </div>
                <div class="flex-grow bg-[#090f1c] p-6 flex justify-center items-start overflow-auto relative min-h-[500px]">
                    <div id="paperPreview" class="flex shadow-[0_0_30px_rgba(0,0,0,0.8)] transition-all duration-300 mx-auto lg:mx-0"></div>
                </div>
                <div class="bg-slate-950/80 border-t border-slate-800 px-6 py-5 flex justify-center">
                    <button type="button" id="generateBtn" onclick="executePrintJob()" class="cyan-glow-btn w-full md:w-2/3 text-white font-black text-sm uppercase tracking-widest px-8 py-4 rounded-xl flex items-center justify-center gap-3">
                        <i class="fa-solid fa-print text-lg"></i> GENERATE HD PRINT SHEET
                    </button>
                </div>
            </div>
        </section>

        <div id="cropModal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-[100] hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col">
                <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                    <h3 class="text-sm font-black uppercase tracking-widest text-cyan-400"><i class="fa-solid fa-crop-simple mr-2"></i> Perfect Cut Engine</h3>
                    <button onclick="closeCropModal()" class="text-slate-500 hover:text-rose-500 transition-colors"><i class="fa-solid fa-xmark text-2xl"></i></button>
                </div>
                <div class="p-4 bg-[#090f1c] flex justify-center items-center h-[60vh]">
                    <img id="cropTargetImage" class="max-h-full max-w-full">
                </div>
                <div class="px-6 py-4 bg-slate-950 border-t border-slate-800 flex justify-between items-center">
                    <div class="flex gap-3">
                        <button onclick="cropper.rotate(-90)" class="px-4 py-2 bg-slate-800 rounded-xl text-slate-300 hover:bg-slate-700"><i class="fa-solid fa-rotate-left"></i></button>
                        <button onclick="cropper.rotate(90)" class="px-4 py-2 bg-slate-800 rounded-xl text-slate-300 hover:bg-slate-700"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                    <button onclick="saveCrop()" class="cyan-glow-btn px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest flex items-center gap-2">
                        <i class="fa-solid fa-check"></i> SET IMAGE
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let activeJob = 'id_card'; let cropper = null; let currentCropType = '';
        let printBlobs = { front: null, back: null, photo: null };
        let previewUrls = { front: '', back: '', photo: '' };

        const paperRatios = { 'a4': { w: 210, h: 297 }, '4x6': { w: 4, h: 6 }, '5x7': { w: 5, h: 7 } };

        document.getElementById('laminationMode').addEventListener('change', function() {
            const dot = this.parentElement.querySelector('.dot'); const bg = this.parentElement.querySelector('.block');
            if(this.checked) { dot.style.transform = 'translateX(100%)'; dot.classList.replace('bg-slate-400', 'bg-white'); bg.classList.replace('bg-slate-950', 'bg-cyan-500'); } 
            else { dot.style.transform = 'translateX(0)'; dot.classList.replace('bg-white', 'bg-slate-400'); bg.classList.replace('bg-cyan-500', 'bg-slate-950'); }
        });

        function enforceSmartLimits() {
            if(activeJob !== 'passport') return;
            const paper = document.getElementById('paperSize').value;
            const size = document.getElementById('photoSize').value;
            const countInput = document.getElementById('photoCount');
            let maxAllowed = 40; 
            if (paper === '4x6') { maxAllowed = (size === 'passport') ? 8 : 15; }
            if (paper === '5x7') { maxAllowed = (size === 'passport') ? 12 : 24; }
            countInput.max = maxAllowed;
            if (parseInt(countInput.value) > maxAllowed) { countInput.value = maxAllowed; }
        }

        function setJobType(job) {
            activeJob = job;
            const tId = document.getElementById('tabIdCard'); const tPass = document.getElementById('tabPassport');
            
            if(job === 'id_card') {
                tId.className = "tab-btn tab-active py-4 px-2 rounded-xl flex flex-col items-center justify-center text-center relative overflow-hidden";
                document.getElementById('iconIdCard').className = "fa-solid fa-id-card-clip text-2xl mb-1 text-cyan-400";
                document.getElementById('textIdCard').className = "text-xs font-black tracking-wider text-white";
                document.getElementById('badgeIdCard').classList.remove('hidden');

                tPass.className = "tab-btn tab-inactive py-4 px-2 rounded-xl flex flex-col items-center justify-center text-center relative overflow-hidden";
                document.getElementById('iconPassport').className = "fa-solid fa-camera-retro text-2xl mb-1 text-slate-500";
                document.getElementById('textPassport').className = "text-xs font-black tracking-wider text-slate-400";
                document.getElementById('badgePassport').classList.add('hidden');
            } else {
                tPass.className = "tab-btn tab-active py-4 px-2 rounded-xl flex flex-col items-center justify-center text-center relative overflow-hidden";
                document.getElementById('iconPassport').className = "fa-solid fa-camera-retro text-2xl mb-1 text-cyan-400";
                document.getElementById('textPassport').className = "text-xs font-black tracking-wider text-white";
                document.getElementById('badgePassport').classList.remove('hidden');

                tId.className = "tab-btn tab-inactive py-4 px-2 rounded-xl flex flex-col items-center justify-center text-center relative overflow-hidden";
                document.getElementById('iconIdCard').className = "fa-solid fa-id-card-clip text-2xl mb-1 text-slate-500";
                document.getElementById('textIdCard').className = "text-xs font-black tracking-wider text-slate-400";
                document.getElementById('badgeIdCard').classList.add('hidden');
            }
            
            document.getElementById('idUploadGroup').style.display = job === 'id_card' ? 'grid' : 'none';
            document.getElementById('laminationBox').style.display = job === 'id_card' ? 'block' : 'none';
            document.getElementById('passportUploadGroup').style.display = job === 'passport' ? 'flex' : 'none';
            document.getElementById('passportConfigBox').style.display = job === 'passport' ? 'flex' : 'none';
            enforceSmartLimits(); updatePreview();
        }

        function triggerCropModal(event, type) {
            const file = event.target.files[0]; if(!file) return;
            currentCropType = type;
            const image = document.getElementById('cropTargetImage');
            image.src = URL.createObjectURL(file);
            const modal = document.getElementById('cropModal');
            modal.classList.remove('hidden'); setTimeout(() => modal.classList.remove('opacity-0'), 10);
            let ratio = (activeJob === 'id_card') ? (8.5 / 5.4) : ((document.getElementById('photoSize').value === 'passport') ? (3.5 / 4.5) : (2.0 / 2.5));
            if(cropper) cropper.destroy();
            cropper = new Cropper(image, { aspectRatio: ratio, viewMode: 1, dragMode: 'move', autoCropArea: 1, background: false });
            event.target.value = ''; 
        }

        function closeCropModal() {
            const modal = document.getElementById('cropModal');
            modal.classList.add('opacity-0'); setTimeout(() => modal.classList.add('hidden'), 300);
            if(cropper) cropper.destroy();
        }

        function saveCrop() {
            if(!cropper) return;
            cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' }).toBlob((blob) => {
                const newUrl = URL.createObjectURL(blob);
                printBlobs[currentCropType] = blob; previewUrls[currentCropType] = newUrl;
                const thumb = document.getElementById(currentCropType + 'Thumb');
                const placeholder = document.getElementById(currentCropType + 'Placeholder');
                thumb.src = newUrl; thumb.classList.remove('hidden');
                if(placeholder) placeholder.classList.add('hidden');
                closeCropModal(); updatePreview();
            }, 'image/jpeg', 0.95);
        }

        // 🎯 FIX LIVE PREVIEW SIMULATION MATRIX
        function updatePreview() {
            const paper = document.getElementById('paperSize').value;
            const paperDiv = document.getElementById('paperPreview');
            const lamination = document.getElementById('laminationMode').checked;
            
            let rawW = paperRatios[paper].w; let rawH = paperRatios[paper].h;
            if (activeJob === 'passport' && paper !== 'a4') { rawW = paperRatios[paper].h; rawH = paperRatios[paper].w; } 
            
            const maxH = 430; const finalH = maxH; const finalW = (rawW / rawH) * finalH;
            paperDiv.style.height = `${finalH}px`; paperDiv.style.width = `${finalW}px`;
            paperDiv.innerHTML = ''; 

            if(activeJob === 'id_card') {
                const isA4 = (paper === 'a4');
                const cardW = finalW * (isA4 ? 0.44 : 0.85); 
                const cardH = cardW * (5.4 / 8.5);

                const createCard = (type, text) => {
                    const d = document.createElement('div'); d.className = 'card-face-preview shadow-sm shrink-0';
                    d.style.width = `${cardW}px`; d.style.height = `${cardH}px`;
                    d.innerHTML = previewUrls[type] ? `<img src="${previewUrls[type]}">` : `<span class="text-[9px] font-bold text-slate-300">${text}</span>`;
                    return d;
                };

                const frontCard = createCard('front', 'FRONT');
                const backCard = createCard('back', 'BACK');

                if (isA4) {
                    if (lamination) {
                        // A4 Lamination Mode: Side-by-Side (Aadve) & Center Linked
                        paperDiv.style.padding = '3%';
                        paperDiv.style.flexDirection = 'row';
                        paperDiv.style.justifyContent = 'center';
                        paperDiv.style.alignItems = 'flex-start';
                        paperDiv.style.gap = '10px';
                        const line = document.createElement('div'); line.className = 'h-[75%] border-l border-dashed border-slate-400 mx-0.5 shrink-0';
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(line); paperDiv.appendChild(backCard);
                    } else {
                        // 🎯 FIX: Normal Mode A4 -> STRICTLY TOP-CENTER, ONE BELOW ANOTHER (Eka khali ek)
                        paperDiv.style.padding = '3% 0px';
                        paperDiv.style.flexDirection = 'column';
                        paperDiv.style.justifyContent = 'flex-start';
                        paperDiv.style.alignItems = 'center'; // Centers horizontally on paper!
                        paperDiv.style.gap = '15px';
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(backCard);
                    }
                } else {
                    // Small Papers (4x6, 5x7): Top-Left Corner, One Below Another
                    paperDiv.style.padding = '3%';
                    paperDiv.style.flexDirection = 'column';
                    paperDiv.style.justifyContent = 'flex-start';
                    paperDiv.style.alignItems = 'flex-start';
                    paperDiv.style.gap = '10px';
                    if(lamination) {
                        backCard.style.transform = 'rotate(180deg)';
                        const line = document.createElement('div'); line.className = 'w-full border-t border-dashed border-slate-400 my-1 shrink-0';
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(line); paperDiv.appendChild(backCard);
                    } else {
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(backCard);
                    }
                }
            } else {
                // PHOTO STUDIO LOGIC: Strictly Horizontal Rows Array Grid
                paperDiv.style.padding = '3%';
                paperDiv.style.display = 'flex'; 
                paperDiv.style.flexDirection = 'row'; 
                paperDiv.style.flexWrap = 'wrap';
                paperDiv.style.justifyContent = 'flex-start'; 
                paperDiv.style.alignContent = 'flex-start';
                paperDiv.style.gap = '6px';

                const sizeType = document.getElementById('photoSize').value;
                const count = parseInt(document.getElementById('photoCount').value) || 1;

                let pw = finalW * (paper==='a4' ? 0.16 : 0.22); let ph = pw * (4.5 / 3.5);
                if(sizeType === 'stamp') { pw = finalW * (paper==='a4' ? 0.11 : 0.16); ph = pw * (2.5 / 2.0); }

                for(let i=0; i<count; i++) {
                    const gridPhoto = document.createElement('div');
                    gridPhoto.className = 'card-face-preview border border-slate-300 shrink-0';
                    gridPhoto.style.width = `${pw}px`; gridPhoto.style.height = `${ph}px`;
                    gridPhoto.innerHTML = previewUrls.photo ? `<img src="${previewUrls.photo}">` : '<i class="fa-solid fa-user text-slate-300 text-[9px]"></i>';
                    paperDiv.appendChild(gridPhoto);
                }
            }
        }
        setJobType('id_card'); 

        async function executePrintJob() {
            const generateBtn = document.getElementById('generateBtn');
            const paperSize = document.getElementById('paperSize').value;
            const laminationMode = document.getElementById('laminationMode').checked;
            
            const formData = new FormData();
            formData.append('job_type', activeJob); formData.append('paper_size', paperSize); formData.append('lamination_mode', laminationMode);

            if (activeJob === 'id_card') {
                if(!printBlobs.front || !printBlobs.back) { alert('Bhava, Front ani Back donhi set kar!'); return; }
                formData.append('front_file', printBlobs.front, 'front.jpg'); formData.append('back_file', printBlobs.back, 'back.jpg');
            } else {
                if(!printBlobs.photo) { alert('Bhava, Photo set kar!'); return; }
                formData.append('passport_file', printBlobs.photo, 'photo.jpg');
                formData.append('photo_size', document.getElementById('photoSize').value); formData.append('photo_count', document.getElementById('photoCount').value);
            }

            generateBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin mr-2'></i> COMPILING SHEET..."; generateBtn.disabled = true;

            try {
                const response = await fetch('/process-print-studio', { method: 'POST', body: formData });
                if(response.ok) {
                    const blob = await response.blob(); const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob);
                    a.download = `Print_Sheet_${activeJob}_${new Date().getTime()}.jpg`; document.body.appendChild(a); a.click(); a.remove();
                } else alert('Error processing print layout!');
            } catch { alert('Network connection error.'); } 
            finally { generateBtn.innerHTML = '<i class="fa-solid fa-print text-lg"></i> GENERATE HD PRINT SHEET'; generateBtn.disabled = false; }
        }
    </script>
</body>
</html>
