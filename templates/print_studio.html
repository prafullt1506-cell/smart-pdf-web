<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Print Studio - Enterprise Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { studioDark: '#0b1324', studioCard: '#111c30', studioBorder: '#1e2d4a', studioCyan: '#06b6d4' } }
            }
        }
    </script>
    <style>
        body { background-color: #070c16; }
        .studio-panel { background-color: var(--tw-colors-studioCard); border: 1px solid var(--tw-colors-studioBorder); }
        .cyan-glow-btn {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.4); transition: all 0.3s ease; color: white; border: none;
        }
        .cyan-glow-btn:hover { box-shadow: 0 0 30px rgba(6, 182, 212, 0.7); transform: translateY(-1px); }
        .inactive-tab { background-color: #0f172a; color: #64748b; border: 1px solid #1e293b; transition: all 0.3s ease; }
        .inactive-tab:hover { background-color: #1e293b; color: #94a3b8; }
        
        #paperPreview { background-color: white; box-shadow: 0 20px 40px rgba(0,0,0,0.6); transition: all 0.3s ease; position: relative; }
        .card-face-preview { background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 4px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-face-preview img { width: 100%; height: 100%; object-fit: cover; }
        
        .cropper-modal { background-color: rgba(0,0,0,0.85); }
        .cropper-view-box { outline: 2px solid #06b6d4; }
    </style>
</head>
<body class="text-slate-200 min-h-screen font-sans flex flex-col">
    
    <header class="border-b border-slate-900 bg-slate-950/80 backdrop-blur px-8 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center gap-3">
            <span class="text-cyan-400 text-xl"><i class="fa-solid fa-print"></i></span>
            <h1 class="text-md font-black tracking-widest text-slate-100 uppercase">Pro Print Studio <span class="text-cyan-500 font-medium text-xs ml-1 opacity-70">- Enterprise Edition</span></h1>
        </div>
        <a href="/" class="px-4 py-1.5 bg-slate-900 hover:bg-slate-800 text-xs font-bold rounded-lg border border-slate-800 transition-all text-slate-300">Dashboard</a>
    </header>

    <main class="container mx-auto px-6 py-6 flex-grow flex flex-col lg:grid lg:grid-cols-12 gap-6 relative">
        
        <section class="lg:col-span-4 flex flex-col gap-4">
            <div class="studio-panel p-5 rounded-xl flex flex-col gap-4 h-full shadow-xl">
                <h2 class="text-xs font-black tracking-wider text-slate-400 uppercase border-b border-slate-800/60 pb-2">Workspace Controls</h2>
                
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1.5 tracking-wider">Select Print Job</label>
                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="jobIdCard" onclick="setJobType('id_card')" class="cyan-glow-btn py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center group">
                            <span class="text-sm font-black tracking-wider">ID CARD STUDIO</span>
                        </button>
                        <button type="button" id="jobPassport" onclick="setJobType('passport')" class="inactive-tab py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center group">
                            <span class="text-sm font-black tracking-wider">PHOTO STUDIO</span>
                        </button>
                    </div>
                </div>

                <div id="uploadSection" class="flex flex-col gap-3 bg-slate-950/40 p-3 rounded-xl border border-slate-900">
                    <div id="idUploadGroup" class="grid grid-cols-2 gap-3">
                        <div class="flex flex-col items-center">
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wide">Upload Front Face</label>
                            <label class="w-full h-20 border border-dashed border-slate-800 rounded-lg bg-slate-900/60 hover:bg-slate-900 flex flex-col items-center justify-center cursor-pointer transition-all p-1 group overflow-hidden">
                                <input type="file" id="idFront" accept="image/*" onchange="triggerCropModal(event, 'front')" class="sr-only">
                                <div id="frontPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400">
                                    <i class="fa-solid fa-crop-simple text-lg mb-1"></i><span class="text-[10px] font-bold">Crop & Set</span>
                                </div>
                                <img id="frontThumb" class="hidden w-full h-full object-cover rounded-md">
                            </label>
                        </div>
                        <div class="flex flex-col items-center">
                            <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wide">Upload Back Face</label>
                            <label class="w-full h-20 border border-dashed border-slate-800 rounded-lg bg-slate-900/60 hover:bg-slate-900 flex flex-col items-center justify-center cursor-pointer transition-all p-1 group overflow-hidden">
                                <input type="file" id="idBack" accept="image/*" onchange="triggerCropModal(event, 'back')" class="sr-only">
                                <div id="backPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400">
                                    <i class="fa-solid fa-crop-simple text-lg mb-1"></i><span class="text-[10px] font-bold">Crop & Set</span>
                                </div>
                                <img id="backThumb" class="hidden w-full h-full object-cover rounded-md">
                            </label>
                        </div>
                    </div>

                    <div id="passportUploadGroup" class="hidden flex-col items-center w-full">
                        <label class="text-[9px] font-bold text-slate-400 uppercase mb-1 tracking-wide">Upload Master Portrait Image</label>
                        <label class="w-full h-20 border border-dashed border-slate-800 rounded-lg bg-slate-900/60 hover:bg-slate-900 flex flex-col items-center justify-center cursor-pointer transition-all p-1 group overflow-hidden">
                            <input type="file" id="passportPhoto" accept="image/*" onchange="triggerCropModal(event, 'photo')" class="sr-only">
                            <div id="photoPlaceholder" class="flex flex-col items-center text-slate-500 group-hover:text-cyan-400">
                                <i class="fa-solid fa-crop-simple text-lg mb-1"></i><span class="text-[10px] font-bold">Crop & Adjust</span>
                            </div>
                            <img id="photoThumb" class="hidden w-16 h-full object-cover rounded-md">
                        </label>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-wider">Paper Configuration</label>
                    <select id="paperSize" onchange="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-slate-200 cursor-pointer">
                        <option value="a4">A4 STANDARD (Save Paper)</option>
                        <option value="4x6">4x6 PHOTO PAPER</option>
                        <option value="5x7">5x7 PHOTO PAPER</option>
                        <option value="8x10">8x10 PHOTO PAPER</option>
                    </select>
                </div>

                <div id="passportConfigBox" class="hidden flex-col gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-wider">Photo Size</label>
                        <select id="photoSize" onchange="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-slate-200">
                            <option value="passport">Passport 3.5x4.5cm</option>
                            <option value="stamp">Stamp 2x2.5cm</option>
                            <option value="visa">Visa 5x5cm</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase block mb-1 tracking-wider">Quantity</label>
                        <input type="number" id="photoCount" value="16" min="1" max="100" oninput="updatePreview()" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-xs font-bold focus:outline-none focus:border-cyan-500 text-white">
                    </div>
                </div>

                <div id="laminationBox" class="mt-2">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <div class="relative">
                            <input type="checkbox" id="laminationMode" onchange="updatePreview()" class="sr-only">
                            <div class="block bg-slate-800 w-11 h-6 rounded-full border border-slate-700 transition-colors"></div>
                            <div class="dot absolute left-1 top-1 bg-slate-400 w-4 h-4 rounded-full transition-all duration-300"></div>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xs font-black text-slate-300 uppercase tracking-wide">Lamination Fold Mode</span>
                            <span class="text-[9px] text-slate-500 font-medium">Changes layout for seamless physical folding.</span>
                        </div>
                    </label>
                </div>
            </div>
        </section>

        <section class="lg:col-span-8 flex flex-col">
            <div class="studio-panel rounded-xl shadow-xl h-full flex flex-col overflow-hidden">
                <div class="bg-slate-950/60 border-b border-slate-800/80 px-5 py-3.5 flex justify-between">
                    <h2 class="text-xs font-black tracking-widest text-slate-400 uppercase"><i class="fa-solid fa-eye text-cyan-500 mr-2"></i>Live Print Preview</h2>
                    <span class="text-[9px] text-cyan-500 font-bold tracking-widest"><i class="fa-solid fa-leaf mr-1"></i> OPTIMIZED MARGINS</span>
                </div>
                
                <div class="flex-grow bg-[#090f1c] p-8 flex items-start justify-center overflow-auto relative min-h-[480px]">
                    <div class="absolute inset-0 opacity-[0.03]" style="background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px); background-size: 24px 24px;"></div>
                    <div id="paperPreview" class="flex shadow-2xl transition-all duration-300 mx-auto"></div>
                </div>

                <div class="bg-slate-950/60 border-t border-slate-800/60 px-6 py-4 flex justify-between items-center">
                    <button type="button" id="generateBtn" onclick="executePrintJob()" class="cyan-glow-btn text-white font-black text-xs uppercase tracking-widest px-8 py-3.5 rounded-xl flex items-center gap-2 w-full justify-center">
                        <i class="fa-solid fa-bolt"></i> Generate Sheet
                    </button>
                </div>
            </div>
        </section>

        <div id="cropModal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl w-full max-w-3xl overflow-hidden flex flex-col">
                <div class="px-6 py-4 border-b border-slate-800 flex justify-between items-center bg-slate-950">
                    <h3 class="text-sm font-black uppercase tracking-widest text-slate-200"><i class="fa-solid fa-crop-simple text-cyan-500 mr-2"></i> Adjust Image</h3>
                    <button onclick="closeCropModal()" class="text-slate-500 hover:text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <div class="p-6 bg-[#090f1c] flex justify-center items-center h-[50vh]">
                    <div class="w-full h-full flex justify-center items-center">
                        <img id="cropTargetImage" class="max-h-full max-w-full">
                    </div>
                </div>
                <div class="px-6 py-4 bg-slate-950 border-t border-slate-800 flex justify-between items-center">
                    <div class="flex gap-2">
                        <button onclick="cropper.rotate(-90)" class="px-3 py-2 bg-slate-800 rounded-lg text-slate-300 hover:text-white"><i class="fa-solid fa-rotate-left"></i></button>
                        <button onclick="cropper.rotate(90)" class="px-3 py-2 bg-slate-800 rounded-lg text-slate-300 hover:text-white"><i class="fa-solid fa-rotate-right"></i></button>
                    </div>
                    <button onclick="saveCrop()" class="cyan-glow-btn text-white font-black text-xs uppercase tracking-widest px-6 py-2.5 rounded-lg flex items-center gap-2">
                        <i class="fa-solid fa-check"></i> Save & Apply
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let activeJob = 'id_card';
        let cropper = null; let currentCropType = '';
        let printBlobs = { front: null, back: null, photo: null };
        let previewUrls = { front: '', back: '', photo: '' };

        const paperRatios = { 'a4': { w: 210, h: 297 }, '4x6': { w: 4, h: 6 }, '5x7': { w: 5, h: 7 }, '8x10': { w: 8, h: 10 } };

        document.getElementById('laminationMode').addEventListener('change', function() {
            const dot = this.parentElement.querySelector('.dot'); const bg = this.parentElement.querySelector('.block');
            if(this.checked) { dot.style.transform = 'translateX(100%)'; dot.classList.replace('bg-slate-400', 'bg-white'); bg.classList.replace('bg-slate-800', 'bg-cyan-600'); } 
            else { dot.style.transform = 'translateX(0)'; dot.classList.replace('bg-white', 'bg-slate-400'); bg.classList.replace('bg-cyan-600', 'bg-slate-800'); }
        });

        // 🎯 TABS UI FIX
        function setJobType(job) {
            activeJob = job;
            const btnId = document.getElementById('jobIdCard');
            const btnPass = document.getElementById('jobPassport');
            
            if(job === 'id_card') {
                btnId.className = "cyan-glow-btn py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center group";
                btnPass.className = "inactive-tab py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center group";
            } else {
                btnPass.className = "cyan-glow-btn py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center group";
                btnId.className = "inactive-tab py-3 px-3 rounded-xl flex flex-col items-center justify-center text-center group";
            }
            
            document.getElementById('idUploadGroup').style.display = job === 'id_card' ? 'grid' : 'none';
            document.getElementById('laminationBox').style.display = job === 'id_card' ? 'block' : 'none';
            document.getElementById('passportUploadGroup').style.display = job === 'passport' ? 'flex' : 'none';
            document.getElementById('passportConfigBox').style.display = job === 'passport' ? 'flex' : 'none';
            updatePreview();
        }

        function triggerCropModal(event, type) {
            const file = event.target.files[0]; if(!file) return;
            currentCropType = type;
            const image = document.getElementById('cropTargetImage');
            image.src = URL.createObjectURL(file);

            const modal = document.getElementById('cropModal');
            modal.classList.remove('hidden'); setTimeout(() => modal.classList.remove('opacity-0'), 10);

            let ratio = NaN;
            if(activeJob === 'id_card') { ratio = 8.5 / 5.4; } 
            else {
                const s = document.getElementById('photoSize').value;
                if(s === 'passport') ratio = 3.5 / 4.5;
                if(s === 'stamp') ratio = 2.0 / 2.5;
                if(s === 'visa') ratio = 1;
            }

            if(cropper) cropper.destroy();
            cropper = new Cropper(image, { aspectRatio: ratio, viewMode: 1, dragMode: 'move', autoCropArea: 1, background: false });
            event.target.value = ''; 
        }

        function closeCropModal() {
            const modal = document.getElementById('cropModal');
            modal.classList.add('opacity-0'); setTimeout(() => modal.classList.add('hidden'), 300);
            if(cropper) cropper.destroy();
        }

        function saveCrop() {
            if(!cropper) return;
            cropper.getCroppedCanvas({ imageSmoothingQuality: 'high' }).toBlob((blob) => {
                const newUrl = URL.createObjectURL(blob);
                printBlobs[currentCropType] = blob; previewUrls[currentCropType] = newUrl;
                const thumb = document.getElementById(currentCropType + 'Thumb');
                const placeholder = document.getElementById(currentCropType + 'Placeholder');
                thumb.src = newUrl; thumb.classList.remove('hidden');
                if(placeholder) placeholder.classList.add('hidden');
                closeCropModal(); updatePreview();
            }, 'image/jpeg', 0.95);
        }

        // 🎯 NEW LIVE PREVIEW LOGIC
        function updatePreview() {
            const paper = document.getElementById('paperSize').value;
            const paperDiv = document.getElementById('paperPreview');
            const lamination = document.getElementById('laminationMode').checked;
            
            const ratio = paperRatios[paper];
            const maxH = 400; const finalH = maxH; const finalW = (ratio.w / ratio.h) * finalH;
            
            paperDiv.style.height = `${finalH}px`; paperDiv.style.width = `${finalW}px`;
            paperDiv.innerHTML = ''; 

            // Smaller Margins!
            paperDiv.style.padding = '3%';

            if(activeJob === 'id_card') {
                const createCard = (type, text) => {
                    const d = document.createElement('div'); d.className = 'card-face-preview shadow-sm shrink-0';
                    d.style.width = `${cardW}px`; d.style.height = `${cardH}px`;
                    d.innerHTML = previewUrls[type] ? `<img src="${previewUrls[type]}">` : `<span class="text-[9px] font-bold text-slate-300">${text}</span>`;
                    return d;
                };

                const isA4 = (paper === 'a4');
                const cardW = finalW * (isA4 ? 0.42 : 0.75);
                const cardH = cardW * (5.4 / 8.5);
                const frontCard = createCard('front', 'FRONT');
                const backCard = createCard('back', 'BACK');

                if (isA4) {
                    if (lamination) {
                        // A4 + Lamination: TOP-CENTER, SIDE-BY-SIDE
                        paperDiv.style.flexDirection = 'row';
                        paperDiv.style.justifyContent = 'center';
                        paperDiv.style.alignItems = 'flex-start';
                        paperDiv.style.gap = '15px';
                        
                        const line = document.createElement('div');
                        line.className = 'h-full border-l border-dashed border-slate-400 mx-1 shrink-0';
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(line); paperDiv.appendChild(backCard);
                    } else {
                        // A4 + Normal: TOP-CENTER, ONE BELOW ANOTHER
                        paperDiv.style.flexDirection = 'column';
                        paperDiv.style.justifyContent = 'flex-start';
                        paperDiv.style.alignItems = 'center';
                        paperDiv.style.gap = '20px';
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(backCard);
                    }
                } else {
                    // Small Papers (4x6, 5x7): TOP-LEFT, ONE BELOW ANOTHER
                    paperDiv.style.flexDirection = 'column';
                    paperDiv.style.justifyContent = 'flex-start';
                    paperDiv.style.alignItems = 'flex-start';
                    paperDiv.style.gap = '12px';
                    
                    if(lamination) {
                        backCard.style.transform = 'rotate(180deg)';
                        const line = document.createElement('div');
                        line.className = 'w-full border-t border-dashed border-slate-400 my-1 shrink-0 text-center relative';
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(line); paperDiv.appendChild(backCard);
                    } else {
                        paperDiv.appendChild(frontCard); paperDiv.appendChild(backCard);
                    }
                }
            } else {
                paperDiv.style.display = 'flex'; paperDiv.style.flexWrap = 'wrap';
                paperDiv.style.justifyContent = 'flex-start'; paperDiv.style.alignContent = 'flex-start';
                paperDiv.style.gap = '4px';

                const sizeType = document.getElementById('photoSize').value;
                const count = parseInt(document.getElementById('photoCount').value) || 1;

                let pw = finalW * 0.16; let ph = pw * (4.5 / 3.5);
                if(sizeType === 'stamp') { pw = finalW * 0.11; ph = pw * (2.5 / 2); }
                if(sizeType === 'visa') { pw = finalW * 0.22; ph = pw; }

                for(let i=0; i<count; i++) {
                    const gridPhoto = document.createElement('div');
                    gridPhoto.className = 'card-face-preview border border-slate-300 shrink-0';
                    gridPhoto.style.width = `${pw}px`; gridPhoto.style.height = `${ph}px`;
                    gridPhoto.innerHTML = previewUrls.photo ? `<img src="${previewUrls.photo}">` : '<i class="fa-solid fa-user text-slate-300 text-[9px]"></i>';
                    paperDiv.appendChild(gridPhoto);
                    if(i >= 48) break; 
                }
            }
        }
        updatePreview();

        async function executePrintJob() {
            const generateBtn = document.getElementById('generateBtn');
            const paperSize = document.getElementById('paperSize').value;
            const laminationMode = document.getElementById('laminationMode').checked;
            
            const formData = new FormData();
            formData.append('job_type', activeJob);
            formData.append('paper_size', paperSize);
            formData.append('lamination_mode', laminationMode);

            if (activeJob === 'id_card') {
                if(!printBlobs.front || !printBlobs.back) { alert('Please crop and set both Front and Back faces.'); return; }
                formData.append('front_file', printBlobs.front, 'front.jpg');
                formData.append('back_file', printBlobs.back, 'back.jpg');
            } else {
                if(!printBlobs.photo) { alert('Please crop and set a portrait photo.'); return; }
                formData.append('passport_file', printBlobs.photo, 'photo.jpg');
                formData.append('photo_size', document.getElementById('photoSize').value);
                formData.append('photo_count', document.getElementById('photoCount').value);
            }

            generateBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin mr-2'></i> COMPILING...";
            generateBtn.disabled = true;

            try {
                const response = await fetch('/process-print-studio', { method: 'POST', body: formData });
                if(response.ok) {
                    const blob = await response.blob();
                    const a = document.createElement('a'); a.href = window.URL.createObjectURL(blob);
                    a.download = `Print_Sheet_${activeJob}_${new Date().getTime()}.jpg`;
                    document.body.appendChild(a); a.click(); a.remove();
                } else alert('Error creating layout.');
            } catch { alert('Network connection error.'); } 
            finally { generateBtn.innerHTML = '<i class="fa-solid fa-bolt"></i> Generate Sheet'; generateBtn.disabled = false; }
        }
    </script>
</body>
</html>
